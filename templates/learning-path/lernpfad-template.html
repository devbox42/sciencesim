<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lernpfad</title>
    <style>
/* ═══════════════════════════════════════════════════════════════
   SCIENCESIM DESIGN SYSTEM - Lernpfad Template
   Clean, functional, interleaved content/exercises
═══════════════════════════════════════════════════════════════ */

* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
}

:root {
    --accent: #2c5aa0;
    --accent-light: #e8f0fa;
    --accent-dark: #1e3d6b;
    --bg: #f5f5f5;
    --white: #ffffff;
    --border: #dddddd;
    --border-light: #eeeeee;
    --text-primary: #222222;
    --text-secondary: #555555;
    --text-muted: #888888;
    --success: #2a7a4b;
    --success-bg: #e8f5e9;
    --warning: #b35c00;
    --warning-bg: #fff3e0;
    --error: #c62828;
    --error-bg: #ffebee;
}

body.physik { --accent: #2c5aa0; --accent-light: #e8f0fa; }
body.chemie { --accent: #2a7a4b; --accent-light: #e8f5e9; }
body.informatik { --accent: #b35c00; --accent-light: #fff3e0; }

body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh; 
    padding: 20px;
    line-height: 1.6;
}

.container { 
    max-width: 900px; 
    margin: 0 auto; 
}

/* ═══════════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════════ */

header {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 15px 20px;
    margin-bottom: 15px;
}

header h1 {
    font-size: 1.4em;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 5px;
}

.breadcrumb {
    font-size: 0.85em;
    color: var(--text-muted);
}

.breadcrumb a {
    color: var(--accent);
    text-decoration: none;
}

/* ═══════════════════════════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════════════════════════ */

.progress-container {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 12px 15px;
    margin-bottom: 15px;
}

.progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.9em;
}

.progress-label {
    color: var(--text-secondary);
}

.progress-count {
    font-weight: 600;
    color: var(--accent);
}

.progress-bar {
    width: 100%;
    height: 8px;
    background: var(--border-light);
}

.progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
}

/* Step indicators */
.step-indicators {
    display: flex;
    gap: 4px;
    margin-top: 10px;
    flex-wrap: wrap;
}

.step-dot {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7em;
    font-weight: 600;
    border: 2px solid var(--border);
    background: var(--white);
    cursor: pointer;
}

.step-dot.completed {
    background: var(--success);
    border-color: var(--success);
    color: var(--white);
}

.step-dot.current {
    border-color: var(--accent);
    border-width: 3px;
    color: var(--accent);
}

.step-dot.content { border-style: solid; }
.step-dot.exercise { border-style: dashed; }
.step-dot.simulation { background: var(--accent-light); }
.step-dot.test { background: var(--warning-bg); border-color: var(--warning); }

/* ═══════════════════════════════════════════════════════════════
   STEP CONTENT
═══════════════════════════════════════════════════════════════ */

.step-container {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 15px;
}

.step-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--accent);
}

.step-title {
    font-size: 1.1em;
    font-weight: 600;
    color: var(--text-primary);
}

.step-type {
    font-size: 0.8em;
    padding: 3px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
}

.step-type.content { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.step-type.exercise { background: var(--success-bg); color: var(--success); border-color: var(--success); }
.step-type.simulation { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.step-type.test { background: var(--warning-bg); color: var(--warning); border-color: var(--warning); }

/* Content area */
.step-body {
    font-size: 0.95em;
    line-height: 1.7;
}

.step-body p {
    margin-bottom: 12px;
}

.step-body h3 {
    font-size: 1em;
    font-weight: 600;
    margin: 20px 0 10px 0;
    color: var(--text-primary);
}

.step-body ul, .step-body ol {
    margin: 10px 0 10px 25px;
}

.step-body li {
    margin-bottom: 5px;
}

/* ═══════════════════════════════════════════════════════════════
   FORMULA BOX
═══════════════════════════════════════════════════════════════ */

.formula {
    background: var(--bg);
    padding: 15px;
    text-align: center;
    font-family: "Times New Roman", Georgia, serif;
    font-size: 1.2em;
    margin: 15px 0;
    border-left: 3px solid var(--accent);
}

/* ═══════════════════════════════════════════════════════════════
   INFO BOX
═══════════════════════════════════════════════════════════════ */

.info-box {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    padding: 12px 15px;
    margin: 15px 0;
    font-size: 0.9em;
}

.info-box strong {
    color: var(--accent);
}

.merksatz {
    background: var(--success-bg);
    border-left: 3px solid var(--success);
    padding: 12px 15px;
    margin: 15px 0;
    font-size: 0.95em;
}

.merksatz::before {
    content: "📝 Merke: ";
    font-weight: 600;
    color: var(--success);
}

/* ═══════════════════════════════════════════════════════════════
   SIMULATION EMBED
═══════════════════════════════════════════════════════════════ */

.simulation-embed {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 20px;
    margin: 15px 0;
    text-align: center;
}

.simulation-embed iframe {
    border: 1px solid var(--border);
    max-width: 100%;
}

.simulation-link {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: var(--accent);
    color: var(--white);
    text-decoration: none;
    font-size: 0.9em;
}

.simulation-link:hover {
    background: var(--accent-dark);
}

/* ═══════════════════════════════════════════════════════════════
   EXERCISE COMPONENTS
═══════════════════════════════════════════════════════════════ */

.exercise-box {
    border: 1px solid var(--border);
    padding: 15px;
    margin: 15px 0;
    background: var(--white);
}

.exercise-question {
    font-weight: 500;
    margin-bottom: 12px;
}

.exercise-question .operator {
    color: var(--accent);
    font-weight: 600;
}

/* MC Options */
.mc-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.mc-option {
    display: flex;
    align-items: flex-start;
    padding: 10px 12px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
}

.mc-option:hover {
    background: var(--bg);
}

.mc-option.selected {
    background: var(--accent-light);
    border-color: var(--accent);
}

.mc-option.correct {
    background: var(--success-bg);
    border-color: var(--success);
}

.mc-option.incorrect {
    background: var(--error-bg);
    border-color: var(--error);
}

.mc-option .letter {
    font-weight: 600;
    margin-right: 10px;
    color: var(--text-secondary);
}

/* Numeric Input */
.numeric-input {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
}

.numeric-input input {
    padding: 10px;
    font-size: 1em;
    border: 1px solid var(--border);
    width: 120px;
    text-align: right;
    font-family: "SF Mono", Monaco, monospace;
}

.numeric-input select {
    padding: 10px;
    font-size: 1em;
    border: 1px solid var(--border);
}

.numeric-input input:focus,
.numeric-input select:focus {
    outline: none;
    border-color: var(--accent);
}

/* Check Button */
.check-btn {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 0.9em;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: var(--white);
    cursor: pointer;
}

.check-btn:hover {
    background: var(--accent-dark);
}

.check-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Feedback */
.feedback {
    margin-top: 15px;
    padding: 12px;
    font-size: 0.9em;
}

.feedback.correct {
    background: var(--success-bg);
    border-left: 3px solid var(--success);
}

.feedback.incorrect {
    background: var(--error-bg);
    border-left: 3px solid var(--error);
}

.feedback.partial {
    background: var(--warning-bg);
    border-left: 3px solid var(--warning);
}

/* ═══════════════════════════════════════════════════════════════
   TWO-COLUMN LAYOUT (for simulations)
═══════════════════════════════════════════════════════════════ */

.two-column {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 20px;
}

@media (max-width: 700px) {
    .two-column {
        grid-template-columns: 1fr;
    }
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════ */

.nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: var(--white);
    border: 1px solid var(--border);
}

.nav-row button {
    padding: 10px 20px;
    font-size: 0.9em;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
}

.nav-row button:hover:not(:disabled) {
    background: var(--bg);
}

.nav-row button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.nav-row button.primary {
    background: var(--accent);
    color: var(--white);
    border-color: var(--accent);
}

.nav-row button.primary:hover:not(:disabled) {
    background: var(--accent-dark);
}

.nav-info {
    font-size: 0.9em;
    color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════════════════
   COMPLETION SCREEN
═══════════════════════════════════════════════════════════════ */

.completion-box {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 30px;
    text-align: center;
}

.completion-icon {
    font-size: 3em;
    margin-bottom: 15px;
}

.completion-title {
    font-size: 1.5em;
    font-weight: 600;
    margin-bottom: 10px;
}

.completion-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    margin: 20px 0;
}

.stat-item {
    padding: 15px;
    background: var(--bg);
}

.stat-value {
    font-size: 1.5em;
    font-weight: 700;
    color: var(--accent);
}

.stat-label {
    font-size: 0.8em;
    color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════════ */

.hidden { display: none !important; }
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); }
.mt-10 { margin-top: 10px; }
.mt-15 { margin-top: 15px; }
.mb-15 { margin-bottom: 15px; }

    </style>
</head>
<body class="physik">

<div class="container">
    
    <!-- Header -->
    <header>
        <h1 id="pathTitle">Dichte - Lernpfad</h1>
        <p class="breadcrumb">
            <a href="#">sciencesim</a> › 
            <a href="#">Physik</a> › 
            <span>Klasse 7</span>
        </p>
    </header>
    
    <!-- Progress -->
    <div class="progress-container">
        <div class="progress-header">
            <span class="progress-label">Fortschritt:</span>
            <span class="progress-count"><span id="completedSteps">0</span> / <span id="totalSteps">6</span> Schritte</span>
        </div>
        <div class="progress-bar">
            <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>
        </div>
        <div class="step-indicators" id="stepIndicators">
            <!-- Generated by JS -->
        </div>
    </div>
    
    <!-- Step Content -->
    <div id="stepContainer">
        <!-- Current step rendered here -->
    </div>
    
    <!-- Navigation -->
    <div class="nav-row">
        <button id="btnPrev" disabled>← Zurück</button>
        <span class="nav-info">Schritt <span id="currentStep">1</span> von <span id="totalStepsNav">6</span></span>
        <button id="btnNext" class="primary">Weiter →</button>
    </div>
    
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURATION
═══════════════════════════════════════════════════════════════ */

const LERNPFAD = {
    id: "kl7-dichte",
    title: "Dichte - Lernpfad",
    subject: "physik",
    grade: "7",
    
    steps: [
        // ─────────────────────────────────────────────────────────
        // STEP 1: Content
        // ─────────────────────────────────────────────────────────
        {
            type: "content",
            title: "Was ist Dichte?",
            content: `
                <p>Stell dir vor, du hältst einen Würfel aus Holz und einen gleich großen Würfel aus Eisen in den Händen. Obwohl beide gleich groß sind, fühlt sich der Eisenwürfel viel schwerer an. Warum?</p>
                
                <p>Der Grund dafür ist die <strong>Dichte</strong> – eine wichtige Eigenschaft aller Stoffe.</p>
                
                <div class="info-box">
                    <strong>Definition:</strong> Die Dichte gibt an, wie viel Masse in einem bestimmten Volumen eines Stoffes enthalten ist.
                </div>
                
                <h3>Dichte im Alltag</h3>
                <p>Die Dichte erklärt viele Phänomene aus unserem Alltag:</p>
                <ul>
                    <li>Warum schwimmt Holz auf Wasser?</li>
                    <li>Warum sinkt ein Stein?</li>
                    <li>Warum steigen Luftballons mit Helium auf?</li>
                </ul>
                
                <div class="merksatz">
                    Die Dichte ist eine Stoffeigenschaft – jeder Stoff hat seine eigene, charakteristische Dichte.
                </div>
            `
        },
        
        // ─────────────────────────────────────────────────────────
        // STEP 2: Exercise (interleaved!)
        // ─────────────────────────────────────────────────────────
        {
            type: "exercise",
            title: "Übung: Dichte verstehen",
            exercises: [
                {
                    id: "ex1",
                    type: "mc",
                    question: "<span class='operator'>Nenne</span>, was die Dichte beschreibt.",
                    options: [
                        "Wie groß ein Körper ist",
                        "Wie viel Masse in einem Volumen steckt",
                        "Wie schnell sich ein Körper bewegt",
                        "Wie warm ein Körper ist"
                    ],
                    correct: 1,
                    feedback: "Richtig! Die Dichte beschreibt, wie viel Masse in einem bestimmten Volumen enthalten ist."
                },
                {
                    id: "ex2",
                    type: "mc",
                    question: "<span class='operator'>Erkläre</span>, warum ein Eisenwürfel schwerer ist als ein gleich großer Holzwürfel.",
                    options: [
                        "Eisen hat eine größere Dichte als Holz",
                        "Eisen hat mehr Volumen als Holz",
                        "Holz ist wärmer als Eisen",
                        "Holz hat mehr Masse als Eisen"
                    ],
                    correct: 0,
                    feedback: "Genau! Eisen hat eine größere Dichte (ρ ≈ 7,9 g/cm³) als Holz (ρ ≈ 0,5 g/cm³)."
                }
            ]
        },
        
        // ─────────────────────────────────────────────────────────
        // STEP 3: Content (Formula)
        // ─────────────────────────────────────────────────────────
        {
            type: "content",
            title: "Die Dichte-Formel",
            content: `
                <p>Die Dichte berechnet sich aus der Masse und dem Volumen eines Körpers:</p>
                
                <div class="formula">
                    ρ = m / V
                </div>
                
                <h3>Die Größen:</h3>
                <ul>
                    <li><strong>ρ</strong> (rho) = Dichte in g/cm³ oder kg/m³</li>
                    <li><strong>m</strong> = Masse in g oder kg</li>
                    <li><strong>V</strong> = Volumen in cm³ oder m³</li>
                </ul>
                
                <div class="info-box">
                    <strong>Umrechnung:</strong> 1 g/cm³ = 1000 kg/m³
                </div>
                
                <h3>Typische Dichtewerte:</h3>
                <table style="width:100%; border-collapse:collapse; margin:15px 0; font-size:0.9em;">
                    <tr style="background:var(--bg);">
                        <th style="padding:8px; border:1px solid var(--border); text-align:left;">Stoff</th>
                        <th style="padding:8px; border:1px solid var(--border); text-align:right;">Dichte in g/cm³</th>
                    </tr>
                    <tr>
                        <td style="padding:8px; border:1px solid var(--border);">Wasser</td>
                        <td style="padding:8px; border:1px solid var(--border); text-align:right;">1,0</td>
                    </tr>
                    <tr>
                        <td style="padding:8px; border:1px solid var(--border);">Holz (Eiche)</td>
                        <td style="padding:8px; border:1px solid var(--border); text-align:right;">0,6 – 0,9</td>
                    </tr>
                    <tr>
                        <td style="padding:8px; border:1px solid var(--border);">Aluminium</td>
                        <td style="padding:8px; border:1px solid var(--border); text-align:right;">2,7</td>
                    </tr>
                    <tr>
                        <td style="padding:8px; border:1px solid var(--border);">Eisen</td>
                        <td style="padding:8px; border:1px solid var(--border); text-align:right;">7,9</td>
                    </tr>
                    <tr>
                        <td style="padding:8px; border:1px solid var(--border);">Gold</td>
                        <td style="padding:8px; border:1px solid var(--border); text-align:right;">19,3</td>
                    </tr>
                </table>
            `
        },
        
        // ─────────────────────────────────────────────────────────
        // STEP 4: Exercise (Calculation)
        // ─────────────────────────────────────────────────────────
        {
            type: "exercise",
            title: "Übung: Dichte berechnen",
            exercises: [
                {
                    id: "calc1",
                    type: "numeric",
                    question: "<span class='operator'>Berechne</span> die Dichte eines Körpers mit m = 200 g und V = 100 cm³.",
                    correct: 2,
                    unit: "g/cm³",
                    tolerance: 0.1,
                    feedback: "ρ = m/V = 200 g / 100 cm³ = 2 g/cm³. Das entspricht der Dichte von Aluminium!"
                },
                {
                    id: "calc2",
                    type: "numeric",
                    question: "<span class='operator'>Berechne</span> die Dichte: m = 50 g, V = 50 cm³.",
                    correct: 1,
                    unit: "g/cm³",
                    tolerance: 0.1,
                    feedback: "ρ = m/V = 50 g / 50 cm³ = 1 g/cm³. Das ist die Dichte von Wasser!"
                }
            ]
        },
        
        // ─────────────────────────────────────────────────────────
        // STEP 5: Simulation
        // ─────────────────────────────────────────────────────────
        {
            type: "simulation",
            title: "Experiment: Schwimmen und Sinken",
            description: "Untersuche in der Simulation, welche Körper schwimmen und welche sinken.",
            url: "https://sciencesim.github.io/dichte/",
            fallbackText: "Öffne die Simulation in einem neuen Tab."
        },
        
        // ─────────────────────────────────────────────────────────
        // STEP 6: Final Exercise
        // ─────────────────────────────────────────────────────────
        {
            type: "exercise",
            title: "Abschlussübung",
            exercises: [
                {
                    id: "final1",
                    type: "mc",
                    question: "Ein Körper hat ρ = 0,8 g/cm³. Wird er in Wasser (ρ = 1,0 g/cm³) <span class='operator'>schwimmen oder sinken</span>?",
                    options: [
                        "Er wird schwimmen",
                        "Er wird sinken",
                        "Er wird schweben",
                        "Das kann man nicht sagen"
                    ],
                    correct: 0,
                    feedback: "Richtig! Da ρ_Körper < ρ_Wasser, schwimmt der Körper."
                },
                {
                    id: "final2",
                    type: "numeric",
                    question: "Ein Würfel (V = 8 cm³) schwimmt auf Wasser. Seine Masse beträgt 4 g. <span class='operator'>Berechne</span> seine Dichte.",
                    correct: 0.5,
                    unit: "g/cm³",
                    tolerance: 0.1,
                    feedback: "ρ = 4g / 8cm³ = 0,5 g/cm³. Das ist typisch für leichtes Holz!"
                }
            ]
        }
    ]
};

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */

let currentStep = 0;
let completedSteps = new Set();
let exerciseAnswers = {};

/* ═══════════════════════════════════════════════════════════════
   INITIALIZATION
═══════════════════════════════════════════════════════════════ */

function init() {
    document.body.className = LERNPFAD.subject;
    document.getElementById('pathTitle').textContent = LERNPFAD.title;
    document.getElementById('totalSteps').textContent = LERNPFAD.steps.length;
    document.getElementById('totalStepsNav').textContent = LERNPFAD.steps.length;
    
    generateStepIndicators();
    renderStep(0);
    bindEvents();
    loadState();
}

function generateStepIndicators() {
    const container = document.getElementById('stepIndicators');
    container.innerHTML = '';
    
    LERNPFAD.steps.forEach((step, i) => {
        const dot = document.createElement('div');
        dot.className = `step-dot ${step.type}`;
        if (i === 0) dot.classList.add('current');
        dot.textContent = i + 1;
        dot.dataset.index = i;
        dot.addEventListener('click', () => goToStep(i));
        container.appendChild(dot);
    });
}

function bindEvents() {
    document.getElementById('btnPrev').addEventListener('click', prevStep);
    document.getElementById('btnNext').addEventListener('click', nextStep);
}

/* ═══════════════════════════════════════════════════════════════
   STEP RENDERING
═══════════════════════════════════════════════════════════════ */

function renderStep(index) {
    currentStep = index;
    const step = LERNPFAD.steps[index];
    const container = document.getElementById('stepContainer');
    
    let html = `
        <div class="step-container">
            <div class="step-header">
                <span class="step-title">${step.title}</span>
                <span class="step-type ${step.type}">${getTypeLabel(step.type)}</span>
            </div>
            <div class="step-body">
    `;
    
    switch (step.type) {
        case 'content':
            html += step.content;
            break;
        case 'exercise':
            html += renderExercises(step.exercises);
            break;
        case 'simulation':
            html += renderSimulation(step);
            break;
    }
    
    html += `
            </div>
        </div>
    `;
    
    container.innerHTML = html;
    
    // Update navigation
    document.getElementById('btnPrev').disabled = index === 0;
    document.getElementById('btnNext').textContent = index === LERNPFAD.steps.length - 1 ? 'Abschließen' : 'Weiter →';
    document.getElementById('currentStep').textContent = index + 1;
    
    // Update indicators
    document.querySelectorAll('.step-dot').forEach((dot, i) => {
        dot.classList.toggle('current', i === index);
        dot.classList.toggle('completed', completedSteps.has(i));
    });
    
    // Bind exercise events if needed
    if (step.type === 'exercise') {
        bindExerciseEvents(step.exercises);
    }
    
    updateProgress();
}

function getTypeLabel(type) {
    switch (type) {
        case 'content': return '📖 Inhalt';
        case 'exercise': return '✏️ Übung';
        case 'simulation': return '🔬 Simulation';
        case 'test': return '📋 Test';
        default: return type;
    }
}

function renderExercises(exercises) {
    let html = '';
    
    exercises.forEach((ex, i) => {
        html += `<div class="exercise-box" data-exercise="${ex.id}">`;
        html += `<div class="exercise-question">${ex.question}</div>`;
        
        if (ex.type === 'mc') {
            html += renderMC(ex);
        } else if (ex.type === 'numeric') {
            html += renderNumeric(ex);
        }
        
        html += `<button class="check-btn" data-id="${ex.id}">Prüfen</button>`;
        html += `<div class="feedback hidden" id="feedback-${ex.id}"></div>`;
        html += `</div>`;
    });
    
    return html;
}

function renderMC(ex) {
    const letters = ['A', 'B', 'C', 'D'];
    let html = '<div class="mc-options">';
    ex.options.forEach((opt, i) => {
        html += `
            <div class="mc-option" data-id="${ex.id}" data-index="${i}">
                <span class="letter">${letters[i]})</span>
                <span>${opt}</span>
            </div>
        `;
    });
    html += '</div>';
    return html;
}

function renderNumeric(ex) {
    return `
        <div class="numeric-input">
            <input type="text" id="input-${ex.id}" placeholder="Wert" inputmode="decimal">
            <span>${ex.unit}</span>
        </div>
    `;
}

function renderSimulation(step) {
    return `
        <p>${step.description}</p>
        <div class="simulation-embed">
            <p class="text-muted">[Simulation wird hier eingebettet]</p>
            <a href="${step.url}" target="_blank" class="simulation-link">🔬 Simulation öffnen</a>
        </div>
    `;
}

function bindExerciseEvents(exercises) {
    // MC options
    document.querySelectorAll('.mc-option').forEach(opt => {
        opt.addEventListener('click', () => {
            const id = opt.dataset.id;
            document.querySelectorAll(`.mc-option[data-id="${id}"]`).forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            exerciseAnswers[id] = parseInt(opt.dataset.index);
        });
    });
    
    // Numeric inputs
    exercises.filter(e => e.type === 'numeric').forEach(ex => {
        const input = document.getElementById(`input-${ex.id}`);
        if (input) {
            input.addEventListener('input', () => {
                exerciseAnswers[ex.id] = parseFloat(input.value.replace(',', '.'));
            });
        }
    });
    
    // Check buttons
    document.querySelectorAll('.check-btn').forEach(btn => {
        btn.addEventListener('click', () => checkExercise(btn.dataset.id, exercises));
    });
}

function checkExercise(id, exercises) {
    const ex = exercises.find(e => e.id === id);
    const answer = exerciseAnswers[id];
    const feedbackEl = document.getElementById(`feedback-${id}`);
    
    let correct = false;
    
    if (ex.type === 'mc') {
        correct = answer === ex.correct;
        document.querySelectorAll(`.mc-option[data-id="${id}"]`).forEach((opt, i) => {
            opt.classList.remove('correct', 'incorrect');
            if (i === ex.correct) opt.classList.add('correct');
            else if (i === answer) opt.classList.add('incorrect');
        });
    } else if (ex.type === 'numeric') {
        correct = Math.abs(answer - ex.correct) <= ex.tolerance;
    }
    
    feedbackEl.classList.remove('hidden', 'correct', 'incorrect');
    feedbackEl.classList.add(correct ? 'correct' : 'incorrect');
    feedbackEl.innerHTML = correct 
        ? `✅ Richtig! ${ex.feedback}`
        : `❌ Leider falsch. ${ex.feedback}`;
    
    // Mark step as completed if all exercises done
    const allAnswered = exercises.every(e => exerciseAnswers[e.id] !== undefined);
    if (allAnswered) {
        completedSteps.add(currentStep);
        updateProgress();
        saveState();
    }
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════ */

function prevStep() {
    if (currentStep > 0) {
        markCurrentComplete();
        renderStep(currentStep - 1);
    }
}

function nextStep() {
    if (currentStep < LERNPFAD.steps.length - 1) {
        markCurrentComplete();
        renderStep(currentStep + 1);
    } else {
        markCurrentComplete();
        showCompletion();
    }
}

function goToStep(index) {
    renderStep(index);
}

function markCurrentComplete() {
    const step = LERNPFAD.steps[currentStep];
    if (step.type === 'content' || step.type === 'simulation') {
        completedSteps.add(currentStep);
        updateProgress();
        saveState();
    }
}

function updateProgress() {
    const pct = (completedSteps.size / LERNPFAD.steps.length) * 100;
    document.getElementById('progressBar').style.width = `${pct}%`;
    document.getElementById('completedSteps').textContent = completedSteps.size;
}

function showCompletion() {
    const container = document.getElementById('stepContainer');
    container.innerHTML = `
        <div class="completion-box">
            <div class="completion-icon">🎉</div>
            <div class="completion-title">Lernpfad abgeschlossen!</div>
            <p class="text-muted">Du hast alle Schritte bearbeitet.</p>
            
            <div class="completion-stats">
                <div class="stat-item">
                    <div class="stat-value">${completedSteps.size}</div>
                    <div class="stat-label">Schritte</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${Object.keys(exerciseAnswers).length}</div>
                    <div class="stat-label">Aufgaben</div>
                </div>
            </div>
            
            <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;border:1px solid var(--accent);background:var(--accent);color:white;cursor:pointer;">
                Von vorne beginnen
            </button>
        </div>
    `;
    
    document.getElementById('btnNext').disabled = true;
}

/* ═══════════════════════════════════════════════════════════════
   STATE PERSISTENCE
═══════════════════════════════════════════════════════════════ */

function saveState() {
    const data = {
        currentStep,
        completedSteps: Array.from(completedSteps),
        exerciseAnswers
    };
    localStorage.setItem(`lernpfad_${LERNPFAD.id}`, JSON.stringify(data));
}

function loadState() {
    const saved = localStorage.getItem(`lernpfad_${LERNPFAD.id}`);
    if (!saved) return;
    
    try {
        const data = JSON.parse(saved);
        completedSteps = new Set(data.completedSteps || []);
        exerciseAnswers = data.exerciseAnswers || {};
        if (data.currentStep) {
            renderStep(data.currentStep);
        }
        updateProgress();
    } catch (e) {
        console.error('Failed to load state:', e);
    }
}

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */

document.addEventListener('DOMContentLoaded', init);

</script>
