<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dichte - Lernpfad | Klasse 7</title>
    <style>
/* ═══════════════════════════════════════════════════════════════
   SCIENCESIM DESIGN SYSTEM - Lernpfad: Dichte (Klasse 7)
   Mit Hefter-Hinweisen für das begleitende Arbeitsblatt
═══════════════════════════════════════════════════════════════ */

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --accent: #2c5aa0;
    --accent-light: #e8f0fa;
    --accent-dark: #1e3d6b;
    --bg: #f5f5f5;
    --white: #ffffff;
    --border: #dddddd;
    --border-light: #eeeeee;
    --text-primary: #222222;
    --text-secondary: #555555;
    --text-muted: #888888;
    --success: #2a7a4b;
    --success-bg: #e8f5e9;
    --warning: #b35c00;
    --warning-bg: #fff3e0;
    --error: #c62828;
    --error-bg: #ffebee;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
}

.container { max-width: 900px; margin: 0 auto; }

/* Header */
header {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 15px 20px;
    margin-bottom: 15px;
}
header h1 { font-size: 1.4em; font-weight: 600; margin-bottom: 5px; }
.breadcrumb { font-size: 0.85em; color: var(--text-muted); }
.breadcrumb a { color: var(--accent); text-decoration: none; }

/* Progress */
.progress-container {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 12px 15px;
    margin-bottom: 15px;
}
.progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.9em;
}
.progress-label { color: var(--text-secondary); }
.progress-count { font-weight: 600; color: var(--accent); }
.progress-bar { width: 100%; height: 8px; background: var(--border-light); }
.progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
.step-indicators { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
.step-dot {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7em; font-weight: 600;
    border: 2px solid var(--border);
    background: var(--white);
    cursor: pointer;
}
.step-dot.completed { background: var(--success); border-color: var(--success); color: var(--white); }
.step-dot.current { border-color: var(--accent); border-width: 3px; color: var(--accent); }
.step-dot.content { border-style: solid; }
.step-dot.exercise { border-style: dashed; }
.step-dot.simulation { background: var(--accent-light); }

/* Step Content */
.step-container {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 15px;
}
.step-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--accent);
}
.step-title { font-size: 1.1em; font-weight: 600; }
.step-type {
    font-size: 0.8em;
    padding: 3px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
}
.step-type.content { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.step-type.exercise { background: var(--success-bg); color: var(--success); border-color: var(--success); }
.step-type.simulation { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

.step-body { font-size: 0.95em; line-height: 1.7; }
.step-body p { margin-bottom: 12px; }
.step-body h3 { font-size: 1em; font-weight: 600; margin: 20px 0 10px 0; }
.step-body ul, .step-body ol { margin: 10px 0 10px 25px; }
.step-body li { margin-bottom: 5px; }

/* Formula Box */
.formula {
    background: var(--bg);
    padding: 15px;
    text-align: center;
    font-family: "Times New Roman", Georgia, serif;
    font-size: 1.2em;
    margin: 15px 0;
    border-left: 3px solid var(--accent);
}

/* Info & Merksatz */
.info-box {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    padding: 12px 15px;
    margin: 15px 0;
    font-size: 0.9em;
}
.info-box strong { color: var(--accent); }

.merksatz {
    background: var(--success-bg);
    border-left: 3px solid var(--success);
    padding: 12px 15px;
    margin: 15px 0;
    font-size: 0.95em;
}
.merksatz strong { color: var(--success); }

/* HEFTER-HINWEIS BOX */
.hefter-hinweis {
    background: var(--warning-bg);
    border: 2px solid var(--warning);
    padding: 12px 15px;
    margin: 20px 0;
    font-size: 0.9em;
}
.hefter-hinweis::before {
    content: "Arbeitsblatt";
    display: inline-block;
    background: var(--warning);
    color: white;
    font-size: 0.75em;
    font-weight: 600;
    padding: 2px 8px;
    margin-bottom: 8px;
}
.hefter-hinweis ul {
    margin: 8px 0 0 20px;
}
.hefter-hinweis li {
    margin-bottom: 4px;
}

/* Table */
.data-table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
    font-size: 0.9em;
}
.data-table th, .data-table td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
}
.data-table th { background: var(--bg); font-weight: 600; }
.data-table td.num { text-align: right; font-family: "SF Mono", Monaco, monospace; }

/* Simulation Container */
.simulation-container {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 15px;
    margin: 15px 0;
}
.simulation-wrapper {
    display: grid;
    grid-template-columns: 1fr 200px;
    gap: 15px;
}
.simulation-canvas-area {
    position: relative;
}
.simulation-canvas-area canvas {
    width: 100%;
    background: white;
    border: 1px solid var(--border);
}
.simulation-controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.sim-btn {
    padding: 8px 12px;
    font-size: 0.85em;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    text-align: left;
}
.sim-btn:hover { background: var(--bg); }
.sim-btn.active { background: var(--accent-light); border-color: var(--accent); }
.sim-toggle {
    display: flex;
    gap: 5px;
}
.sim-toggle button {
    flex: 1;
    padding: 6px;
    font-size: 0.8em;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
}
.sim-toggle button.active { background: var(--accent); color: white; border-color: var(--accent); }
.slider-container {
    margin-top: 10px;
    padding: 10px;
    background: var(--white);
    border: 1px solid var(--border);
}
.slider-container label { font-size: 0.8em; display: block; margin-bottom: 5px; }
.slider-container input[type="range"] { width: 100%; }
.slider-value { font-size: 0.9em; font-weight: 600; text-align: center; margin-top: 5px; }

/* Exercise */
.exercise-box {
    border: 1px solid var(--border);
    padding: 15px;
    margin: 15px 0;
    background: var(--white);
}
.exercise-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}
.exercise-niveau { font-size: 0.85em; color: var(--text-muted); }
.exercise-question { font-weight: 500; margin-bottom: 12px; }
.exercise-question .operator { color: var(--accent); font-weight: 600; }

.mc-options { display: flex; flex-direction: column; gap: 8px; }
.mc-option {
    display: flex;
    align-items: flex-start;
    padding: 10px 12px;
    border: 1px solid var(--border);
    cursor: pointer;
}
.mc-option:hover { background: var(--bg); }
.mc-option.selected { background: var(--accent-light); border-color: var(--accent); }
.mc-option.correct { background: var(--success-bg); border-color: var(--success); }
.mc-option.incorrect { background: var(--error-bg); border-color: var(--error); }
.mc-option .letter { font-weight: 600; margin-right: 10px; color: var(--text-secondary); }

.numeric-input { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.numeric-input input {
    padding: 10px;
    font-size: 1em;
    border: 1px solid var(--border);
    width: 120px;
    text-align: right;
    font-family: "SF Mono", Monaco, monospace;
}
.numeric-input input:focus { outline: none; border-color: var(--accent); }

.matching-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 15px;
    align-items: center;
}
.matching-label { font-weight: 600; color: var(--text-secondary); }
.matching-select {
    padding: 8px;
    font-size: 0.95em;
    border: 1px solid var(--border);
    max-width: 200px;
}

.check-btn {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 0.9em;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: var(--white);
    cursor: pointer;
}
.check-btn:hover { background: var(--accent-dark); }

.feedback { margin-top: 15px; padding: 12px; font-size: 0.9em; }
.feedback.correct { background: var(--success-bg); border-left: 3px solid var(--success); }
.feedback.incorrect { background: var(--error-bg); border-left: 3px solid var(--error); }

/* Navigation */
.nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: var(--white);
    border: 1px solid var(--border);
}
.nav-row button {
    padding: 10px 20px;
    font-size: 0.9em;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
}
.nav-row button:hover:not(:disabled) { background: var(--bg); }
.nav-row button:disabled { opacity: 0.4; cursor: not-allowed; }
.nav-row button.primary { background: var(--accent); color: var(--white); border-color: var(--accent); }
.nav-row button.primary:hover:not(:disabled) { background: var(--accent-dark); }
.nav-info { font-size: 0.9em; color: var(--text-muted); }

/* Completion */
.completion-box {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 30px;
    text-align: center;
}
.completion-title { font-size: 1.5em; font-weight: 600; margin-bottom: 10px; }
.completion-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    margin: 20px 0;
}
.stat-item { padding: 15px; background: var(--bg); }
.stat-value { font-size: 1.5em; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.8em; color: var(--text-muted); }

/* Beispiel-Box */
.beispiel {
    background: #fff9e6;
    border-left: 3px solid #e6a800;
    padding: 12px 15px;
    margin: 15px 0;
    font-size: 0.9em;
}
.beispiel strong { color: #b38600; }

.hidden { display: none !important; }
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="pathTitle">Dichte - Lernpfad</h1>
        <p class="breadcrumb">
            <a href="#">Physik</a> ›
            <span>Klasse 7</span> ›
            <span>Materie</span>
        </p>
    </header>

    <div class="progress-container">
        <div class="progress-header">
            <span class="progress-label">Fortschritt:</span>
            <span class="progress-count"><span id="completedSteps">0</span> / <span id="totalSteps">12</span> Schritte</span>
        </div>
        <div class="progress-bar">
            <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>
        </div>
        <div class="step-indicators" id="stepIndicators"></div>
    </div>

    <div id="stepContainer"></div>

    <div class="nav-row">
        <button id="btnPrev" disabled>← Zurück</button>
        <span class="nav-info">Schritt <span id="currentStep">1</span> von <span id="totalStepsNav">12</span></span>
        <button id="btnNext" class="primary">Weiter →</button>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   LERNPFAD: DICHTE (Klasse 7) - ERWEITERT
   12 Schritte mit integrierter Simulation
═══════════════════════════════════════════════════════════════ */

const LERNPFAD = {
    id: "kl7-dichte",
    title: "Dichte - Lernpfad",
    subject: "physik",
    grade: "7",

    steps: [
        // ═══════════════════════════════════════════════════════════════
        // SCHRITT 1: Einstieg - Alltagserfahrung
        // ═══════════════════════════════════════════════════════════════
        {
            type: "content",
            title: "1. Ein Rätsel zum Einstieg",
            content: `
                <p>Stell dir vor, du hältst zwei Würfel in den Händen:</p>
                <ul>
                    <li>Ein Würfel aus <strong>Holz</strong></li>
                    <li>Ein Würfel aus <strong>Eisen</strong></li>
                </ul>
                <p>Beide Würfel sind <strong>gleich groß</strong> (z. B. 5 cm × 5 cm × 5 cm).</p>

                <div style="text-align:center;margin:20px 0;">
                    <svg width="320" height="160" viewBox="0 0 320 160" style="max-width:100%;">
                        <!-- Holzwürfel -->
                        <g transform="translate(40,20)">
                            <!-- 3D Würfel -->
                            <polygon points="0,40 40,20 40,100 0,120" fill="#c9a227" stroke="#8b6914" stroke-width="1.5"/>
                            <polygon points="0,40 40,20 80,40 40,60" fill="#e6c84a" stroke="#8b6914" stroke-width="1.5"/>
                            <polygon points="40,60 80,40 80,120 40,140" fill="#d4b12e" stroke="#8b6914" stroke-width="1.5"/>
                            <polygon points="0,40 40,60 40,140 0,120" fill="#b89520" stroke="#8b6914" stroke-width="1.5"/>
                            <!-- Maserung -->
                            <line x1="10" y1="50" x2="10" y2="110" stroke="#a07818" stroke-width="0.5" opacity="0.5"/>
                            <line x1="25" y1="55" x2="25" y2="115" stroke="#a07818" stroke-width="0.5" opacity="0.5"/>
                            <!-- Label -->
                            <text x="40" y="155" text-anchor="middle" font-size="12" fill="#555" font-family="sans-serif">Holz</text>
                        </g>
                        <!-- Eisenwürfel -->
                        <g transform="translate(180,20)">
                            <!-- 3D Würfel -->
                            <polygon points="0,40 40,20 40,100 0,120" fill="#5a5a5a" stroke="#333" stroke-width="1.5"/>
                            <polygon points="0,40 40,20 80,40 40,60" fill="#7a7a7a" stroke="#333" stroke-width="1.5"/>
                            <polygon points="40,60 80,40 80,120 40,140" fill="#666" stroke="#333" stroke-width="1.5"/>
                            <polygon points="0,40 40,60 40,140 0,120" fill="#4a4a4a" stroke="#333" stroke-width="1.5"/>
                            <!-- Glanz -->
                            <ellipse cx="55" cy="50" rx="8" ry="4" fill="white" opacity="0.2"/>
                            <!-- Label -->
                            <text x="40" y="155" text-anchor="middle" font-size="12" fill="#555" font-family="sans-serif">Eisen</text>
                        </g>
                        <!-- Gleichheitszeichen -->
                        <text x="160" y="75" text-anchor="middle" font-size="18" fill="#888" font-family="sans-serif">gleich groß</text>
                        <!-- Pfeile für Gewicht -->
                        <g transform="translate(80,95)">
                            <line x1="0" y1="0" x2="0" y2="20" stroke="#2c5aa0" stroke-width="2"/>
                            <polygon points="-5,20 5,20 0,28" fill="#2c5aa0"/>
                            <text x="0" y="42" text-anchor="middle" font-size="10" fill="#2c5aa0" font-family="sans-serif">leicht</text>
                        </g>
                        <g transform="translate(220,95)">
                            <line x1="0" y1="0" x2="0" y2="35" stroke="#c62828" stroke-width="3"/>
                            <polygon points="-6,35 6,35 0,46" fill="#c62828"/>
                            <text x="0" y="60" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold" font-family="sans-serif">schwer</text>
                        </g>
                    </svg>
                </div>

                <div class="info-box">
                    <strong>Frage:</strong> Welcher Würfel fühlt sich schwerer an?
                </div>

                <p>Natürlich der <strong>Eisenwürfel</strong>! Aber warum ist das so?</p>

                <p>Die Antwort liegt in einer wichtigen Stoffeigenschaft: der <strong>Dichte</strong>.</p>

                <div class="beispiel">
                    <strong>Beispiele aus dem Alltag:</strong>
                    <ul>
                        <li>Ein Koffer voll Bücher ist schwerer als ein gleich großer Koffer voll Kleidung</li>
                        <li>Eine Kugel aus Blei wiegt mehr als eine gleich große Kugel aus Plastik</li>
                    </ul>
                </div>
            `
        },

        // ═══════════════════════════════════════════════════════════════
        // SCHRITT 2: Definition der Dichte
        // ═══════════════════════════════════════════════════════════════
        {
            type: "content",
            title: "2. Was ist Dichte?",
            content: `
                <p>Wir haben gesehen: Bei <strong>gleichem Volumen</strong> können Körper unterschiedlich schwer sein.</p>

                <p>Das liegt daran, dass in der gleichen „Menge Raum" unterschiedlich viel Materie (Masse) steckt.</p>

                <div class="merksatz">
                    <strong>Definition:</strong><br>
                    Die <strong>Dichte</strong> gibt an, wie viel <strong>Masse</strong> in einem bestimmten <strong>Volumen</strong> eines Stoffes enthalten ist.
                </div>

                <h3>Was bedeutet das?</h3>
                <ul>
                    <li><strong>Hohe Dichte:</strong> Viel Masse auf kleinem Raum (z. B. Eisen, Blei)</li>
                    <li><strong>Niedrige Dichte:</strong> Wenig Masse auf gleichem Raum (z. B. Holz, Kork)</li>
                </ul>

                <div class="info-box">
                    <strong>Wichtig:</strong> Die Dichte ist eine <strong>Stoffeigenschaft</strong>. Das heißt: Jeder Stoff hat seine eigene, charakteristische Dichte – egal wie groß das Stück ist!
                </div>

                <div class="hefter-hinweis">
                    <strong>Arbeitsblatt:</strong>
                    <ul>
                        <li><strong>Abschnitt 1:</strong> Ergänze die Definition im Lückentext</li>
                        <li>Fülle aus: „Die Dichte ist eine ___________"</li>
                    </ul>
                </div>
            `
        },

        // ═══════════════════════════════════════════════════════════════
        // SCHRITT 3: Übung - Definition verstehen (★)
        // ═══════════════════════════════════════════════════════════════
        {
            type: "exercise",
            title: "3. Übung: Dichte verstehen",
            exercises: [
                {
                    id: "def1",
                    type: "mc",
                    niveau: 1,
                    question: "(*) <span class='operator'>Nenne</span>, was die Dichte beschreibt.",
                    options: [
                        "Wie groß ein Körper ist",
                        "Wie viel Masse in einem Volumen steckt",
                        "Wie schnell sich ein Körper bewegt",
                        "Wie warm ein Körper ist"
                    ],
                    correct: 1,
                    feedback: "Richtig! Die Dichte beschreibt, wie viel Masse in einem bestimmten Volumen enthalten ist."
                },
                {
                    id: "def2",
                    type: "mc",
                    niveau: 1,
                    question: "(*) Ein Eisenwürfel und ein Holzwürfel sind gleich groß. Der Eisenwürfel ist schwerer. <span class='operator'>Erkläre</span>, warum.",
                    options: [
                        "Eisen hat eine größere Dichte als Holz",
                        "Eisen hat mehr Volumen als Holz",
                        "Holz ist älter als Eisen",
                        "Holz hat eine größere Dichte als Eisen"
                    ],
                    correct: 0,
                    feedback: "Genau! Eisen hat eine größere Dichte als Holz. Bei gleichem Volumen hat Eisen deshalb mehr Masse."
                }
            ]
        },

        // ═══════════════════════════════════════════════════════════════
        // SCHRITT 4: Die Formel
        // ═══════════════════════════════════════════════════════════════
        {
            type: "content",
            title: "4. Die Dichte-Formel",
            content: `
                <p>Um die Dichte zu berechnen, brauchen wir zwei Größen:</p>
                <ul>
                    <li><strong>Masse m</strong> – wie schwer ist der Körper?</li>
                    <li><strong>Volumen V</strong> – wie viel Raum nimmt er ein?</li>
                </ul>

                <div class="formula">
                    <strong>ρ = m / V</strong>
                </div>

                <h3>Die Größen und Einheiten:</h3>
                <table class="data-table">
                    <tr><th>Größe</th><th>Formelzeichen</th><th>Einheit</th></tr>
                    <tr><td>Dichte</td><td><strong>ρ</strong> (griechisch: rho)</td><td>g/cm³ oder kg/m³</td></tr>
                    <tr><td>Masse</td><td><strong>m</strong></td><td>g oder kg</td></tr>
                    <tr><td>Volumen</td><td><strong>V</strong></td><td>cm³ oder m³</td></tr>
                </table>

                <h3>Formeldreieck (Merkhilfe)</h3>
                <div style="text-align:center;margin:15px 0;">
                    <svg width="280" height="180" viewBox="0 0 280 180" style="max-width:100%;">
                        <!-- Dreieck -->
                        <polygon points="140,15 40,155 240,155" fill="none" stroke="#2c5aa0" stroke-width="3"/>
                        <!-- Trennlinie horizontal -->
                        <line x1="40" y1="85" x2="240" y2="85" stroke="#2c5aa0" stroke-width="2"/>
                        <!-- Trennlinie vertikal unten -->
                        <line x1="140" y1="85" x2="140" y2="155" stroke="#2c5aa0" stroke-width="2"/>
                        <!-- m oben -->
                        <text x="140" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="#222" font-family="serif" font-style="italic">m</text>
                        <!-- ρ unten links -->
                        <text x="90" y="130" text-anchor="middle" font-size="28" font-weight="bold" fill="#222" font-family="serif" font-style="italic">ρ</text>
                        <!-- V unten rechts -->

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */

let currentStep = 0;
let completedSteps = new Set();
let exerciseAnswers = {};
let simState = null;

/* ═══════════════════════════════════════════════════════════════
   INITIALIZATION
═══════════════════════════════════════════════════════════════ */

function init() {
    document.getElementById('pathTitle').textContent = LERNPFAD.title;
    document.getElementById('totalSteps').textContent = LERNPFAD.steps.length;
    document.getElementById('totalStepsNav').textContent = LERNPFAD.steps.length;
    generateStepIndicators();
    renderStep(0);
    bindEvents();
    loadState();
}

function generateStepIndicators() {
    const container = document.getElementById('stepIndicators');
    container.innerHTML = '';
    LERNPFAD.steps.forEach((step, i) => {
        const dot = document.createElement('div');
        dot.className = `step-dot ${step.type}`;
        if (i === 0) dot.classList.add('current');
        dot.textContent = i + 1;
        dot.dataset.index = i;
        dot.addEventListener('click', () => goToStep(i));
        container.appendChild(dot);
    });
}

function bindEvents() {
    document.getElementById('btnPrev').addEventListener('click', prevStep);
    document.getElementById('btnNext').addEventListener('click', nextStep);
}

/* ═══════════════════════════════════════════════════════════════
   STEP RENDERING
═══════════════════════════════════════════════════════════════ */

function renderStep(index) {
    currentStep = index;
    const step = LERNPFAD.steps[index];
    const container = document.getElementById('stepContainer');

    let html = `
        <div class="step-container">
            <div class="step-header">
                <span class="step-title">${step.title}</span>
                <span class="step-type ${step.type}">${getTypeLabel(step.type)}</span>
            </div>
            <div class="step-body">
    `;

    switch (step.type) {
        case 'content':
            html += step.content;
            break;
        case 'exercise':
            if (step.intro) html += step.intro;
            html += renderExercises(step.exercises);
            break;
        case 'simulation':
            html += renderSimulationStep(step);
            break;
    }

    html += '</div></div>';
    container.innerHTML = html;

    document.getElementById('btnPrev').disabled = index === 0;
    document.getElementById('btnNext').textContent = index === LERNPFAD.steps.length - 1 ? 'Abschließen' : 'Weiter →';
    document.getElementById('currentStep').textContent = index + 1;

    document.querySelectorAll('.step-dot').forEach((dot, i) => {
        dot.classList.toggle('current', i === index);
        dot.classList.toggle('completed', completedSteps.has(i));
    });

    if (step.type === 'exercise') {
        bindExerciseEvents(step.exercises);
    }

    if (step.type === 'simulation' && step.hasInlineSimulation) {
        initInlineSimulation();
    }

    updateProgress();
}

function getTypeLabel(type) {
    switch (type) {
        case 'content': return 'Inhalt';
        case 'exercise': return 'Übung';
        case 'simulation': return 'Experiment';
        default: return type;
    }
}

/* ═══════════════════════════════════════════════════════════════
   INLINE SIMULATION
═══════════════════════════════════════════════════════════════ */

    let html = step.description;

        html += `

                    <div class="simulation-canvas-area">

                        <div style="font-size:0.8em;color:var(--text-muted);margin-bottom:5px;">Material wählen (Klick = Ein/Aus):</div>
                        <button class="sim-btn" data-material="kork">Kork (0,2)</button>
                        <button class="sim-btn" data-material="holz">Holz (0,5)</button>
                        <button class="sim-btn" data-material="oel">Öl (0,9)</button>
                        <button class="sim-btn" data-material="eis">Eis (0,92)</button>
                        <button class="sim-btn" data-material="fisch">Fisch (1,0)</button>
                        <button class="sim-btn" data-material="plastik">Plastik (1,05)</button>
                        <button class="sim-btn" data-material="eisen">Eisen (7,9)</button>

                        <div class="sim-toggle" style="margin-top:15px;">
                            <button id="btnWasser" class="active">Wasser</button>
                            <button id="btnSalz">Salzwasser</button>
                        </div>

                        <div class="slider-container">
                            <label>Eigener Körper:</label>
                            <input type="range" id="customDensity" min="0.1" max="3" step="0.1" value="1.0">
                            <div class="slider-value" id="customValue">ρ = 1,0 g/cm³</div>
                            <button class="sim-btn" id="btnCustom" style="margin-top:5px;">Testen</button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        if (step.guidedQuestions) {
            html += `<div class="info-box" style="margin-top:15px;"><strong>Beobachtungsaufgaben:</strong><ol>`;
            step.guidedQuestions.forEach(q => html += `<li>${q}</li>`);
            html += `</ol></div>`;
        }
    }

    if (step.afterSimulation) {
        html += step.afterSimulation;
    }

    return html;
}

const MATERIALS = {
    kork: { name: "Kork", density: 0.2, color: "#d4a76a", shape: "cork" },
    holz: { name: "Holz", density: 0.5, color: "#8b6914", shape: "rect" },
    oel: { name: "Öl", density: 0.9, color: "#f0d080", shape: "circle" },
    eis: { name: "Eis", density: 0.92, color: "#d4f0ff", shape: "ice" },
    fisch: { name: "Fisch", density: 1.0, color: "#ff9966", shape: "fish" },
    plastik: { name: "Plastik", density: 1.05, color: "#aa88cc", shape: "rect" },
    eisen: { name: "Eisen", density: 7.9, color: "#666666", shape: "cube" }
};

function initInlineSimulation() {
    const canvas = document.getElementById('simCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    simState = {
        fluidDensity: 1.0,
        bodies: {},  // key = material id, value = body object
        animationId: null
    };

    // Material buttons - Toggle-Logik
    document.querySelectorAll('.sim-btn[data-material]').forEach(btn => {
        btn.addEventListener('click', () => {
            const matId = btn.dataset.material;
            if (simState.bodies[matId]) {
                // Bereits aktiv -> entfernen
                delete simState.bodies[matId];
                btn.classList.remove('active');
            } else {
                // Neu hinzufügen
                const mat = MATERIALS[matId];
                addBody(matId, mat);
                btn.classList.add('active');
            }
            startAnimation();
        });
    });

    // Fluid toggle - recalculate all positions
    document.getElementById('btnWasser').addEventListener('click', () => {
        simState.fluidDensity = 1.0;
        document.getElementById('btnWasser').classList.add('active');
        document.getElementById('btnSalz').classList.remove('active');
        recalculateAllPositions();
        startAnimation();
    });
    document.getElementById('btnSalz').addEventListener('click', () => {
        simState.fluidDensity = 1.03;
        document.getElementById('btnSalz').classList.add('active');
        document.getElementById('btnWasser').classList.remove('active');
        recalculateAllPositions();
        startAnimation();
    });

    // Custom slider
    const slider = document.getElementById('customDensity');
    const valueDisplay = document.getElementById('customValue');
    slider.addEventListener('input', () => {
        valueDisplay.textContent = `ρ = ${parseFloat(slider.value).toFixed(1).replace('.', ',')} g/cm³`;
    });
    document.getElementById('btnCustom').addEventListener('click', () => {
        const d = parseFloat(slider.value);
        const customId = 'custom';
        if (simState.bodies[customId]) {
            delete simState.bodies[customId];
        }
        addBody(customId, { name: "Eigener", density: d, color: "#3399ff", shape: "rect" });
        startAnimation();
    });

    drawScene();

    // ═══════════════════════════════════════════════════════════════
    // HELPER FUNCTIONS
    // ═══════════════════════════════════════════════════════════════

    function getTargetY(density) {
        const waterLevel = 100;
        const tankBottom = 280;
        if (density < simState.fluidDensity - 0.02) {
            // Schwimmt: oben an der Wasseroberfläche
            return waterLevel - 5;
        } else if (Math.abs(density - simState.fluidDensity) <= 0.02) {
            // Schwebt: in der Mitte
            return waterLevel + (tankBottom - waterLevel) / 2;
        } else {
            // Sinkt: am Boden
            return tankBottom - 25;
        }
    }

    function addBody(id, mat) {
        // Horizontale Position: verteile Körper
        const keys = Object.keys(simState.bodies);
        const xPositions = [120, 200, 280, 160, 240, 200, 180];
        const xIndex = keys.length % xPositions.length;

        simState.bodies[id] = {
            id: id,
            name: mat.name,
            density: mat.density,
            color: mat.color,
            shape: mat.shape || 'rect',
            x: xPositions[xIndex],
            y: 20,
            vy: 0,
            phase: "falling",
            targetY: getTargetY(mat.density)
        };
    }

    function recalculateAllPositions() {
        Object.values(simState.bodies).forEach(b => {
            b.targetY = getTargetY(b.density);
            b.phase = "moving";
        });
    }

    function startAnimation() {
        if (simState.animationId) cancelAnimationFrame(simState.animationId);
        animate();
    }

    // ═══════════════════════════════════════════════════════════════
    // ANIMATION - Ohne Mittelpause, direkt zum Ziel
    // ═══════════════════════════════════════════════════════════════

    function animate() {
        const waterLevel = 100;
        const gravity = 0.4;
        let anyMoving = false;

        Object.values(simState.bodies).forEach(b => {
            if (b.phase === "falling") {
                // Fallen bis Wasseroberfläche
                b.vy += gravity;
                b.y += b.vy;
                if (b.y >= waterLevel) {
                    b.y = waterLevel;
                    b.vy = 3;
                    b.phase = "inWater";
                }
                anyMoving = true;
            } else if (b.phase === "inWater" || b.phase === "moving") {
                // Direkt zum Ziel bewegen
                const diff = b.targetY - b.y;
                if (Math.abs(diff) > 1) {
                    b.y += diff * 0.08;
                    anyMoving = true;
                } else {
                    b.y = b.targetY;
                    b.phase = "final";
                }
            }
        });

        drawScene();

        if (anyMoving) {
            simState.animationId = requestAnimationFrame(animate);
        } else {
            simState.animationId = null;
        }
    }

    function drawScene() {
        ctx.clearRect(0, 0, 400, 300);

        // Tank
        ctx.fillStyle = "#e0e0e0";
        ctx.fillRect(50, 50, 300, 240);

        // Water
        const waterColor = simState.fluidDensity > 1.01 ? "#a8d4e8" : "#cce5ff";
        ctx.fillStyle = waterColor;
        ctx.fillRect(50, 100, 300, 190);

        // Water label
        ctx.fillStyle = "#666";
        ctx.font = "11px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(simState.fluidDensity > 1.01 ? "Salzwasser ρ=1,03" : "Wasser ρ=1,0", 55, 115);

        // Draw all bodies
        Object.values(simState.bodies).forEach(b => {
            drawBody(b);
        });

        // Tank border
        ctx.strokeStyle = "#888";
        ctx.lineWidth = 2;
        ctx.strokeRect(50, 50, 300, 240);
    }

    function drawBody(b) {
        ctx.save();
        ctx.fillStyle = b.color;

        switch (b.shape) {
            case 'fish':
                // Fisch: Ellipse + Schwanzflosse
                ctx.beginPath();
                ctx.ellipse(b.x, b.y, 22, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(b.x + 22, b.y);
                ctx.lineTo(b.x + 35, b.y - 8);
                ctx.lineTo(b.x + 35, b.y + 8);
                ctx.closePath();
                ctx.fill();
                // Auge
                ctx.fillStyle = "#333";
                ctx.beginPath();
                ctx.arc(b.x - 10, b.y - 2, 2, 0, Math.PI * 2);
                ctx.fill();
                break;

            case 'circle':
                // Öl: Kreis/Tropfen
                ctx.beginPath();
                ctx.arc(b.x, b.y, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "#c9a030";
                ctx.lineWidth = 1;
                ctx.stroke();
                break;

            case 'cork':
                // Korken: Zylinder-artig
                ctx.fillRect(b.x - 12, b.y - 18, 24, 36);
                ctx.strokeStyle = "#8b6914";
                ctx.lineWidth = 1;
                ctx.strokeRect(b.x - 12, b.y - 18, 24, 36);
                // Korken-Linien
                ctx.strokeStyle = "#a07818";
                ctx.beginPath();
                ctx.moveTo(b.x - 8, b.y - 18);
                ctx.lineTo(b.x - 8, b.y + 18);
                ctx.moveTo(b.x + 8, b.y - 18);
                ctx.lineTo(b.x + 8, b.y + 18);
                ctx.stroke();
                break;

            case 'ice':
                // Eiswürfel: transparent mit Glanz
                ctx.globalAlpha = 0.7;
                ctx.fillRect(b.x - 15, b.y - 15, 30, 30);
                ctx.globalAlpha = 1;
                ctx.strokeStyle = "#88c8e8";
                ctx.lineWidth = 2;
                ctx.strokeRect(b.x - 15, b.y - 15, 30, 30);
                // Glanz
                ctx.fillStyle = "rgba(255,255,255,0.5)";
                ctx.fillRect(b.x - 12, b.y - 12, 8, 8);
                break;

            case 'cube':
                // Eisen: Würfel mit Glanz
                ctx.fillRect(b.x - 18, b.y - 15, 36, 30);
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 1;
                ctx.strokeRect(b.x - 18, b.y - 15, 36, 30);
                // Glanz
                ctx.fillStyle = "rgba(255,255,255,0.15)";
                ctx.beginPath();
                ctx.ellipse(b.x - 5, b.y - 8, 6, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                break;

            default:
                // Standard-Rechteck
                ctx.fillRect(b.x - 18, b.y - 12, 36, 24);
                ctx.strokeStyle = "#555";
                ctx.lineWidth = 1;
                ctx.strokeRect(b.x - 18, b.y - 12, 36, 24);
        }

        ctx.restore();

        // Label unter dem Körper
        ctx.fillStyle = "#222";
        ctx.font = "10px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(`${b.name} (${b.density.toFixed(2).replace('.', ',')})`, b.x, b.y + 32);

        // Status anzeigen wenn am Ziel
        if (b.phase === "final") {
            let status = "";
            let statusColor = "#2c5aa0";
            if (b.density < simState.fluidDensity - 0.02) {
                status = "↑";
                statusColor = "#2a7a4b";
            } else if (Math.abs(b.density - simState.fluidDensity) <= 0.02) {
                status = "~";
                statusColor = "#b35c00";
            } else {
                status = "↓";
                statusColor = "#c62828";
            }
            ctx.font = "bold 16px sans-serif";
            ctx.fillStyle = statusColor;
            ctx.fillText(status, b.x, b.y - 22);
        }
    }
}

/* ═══════════════════════════════════════════════════════════════
   EXERCISES
═══════════════════════════════════════════════════════════════ */

function renderExercises(exercises) {
    let html = '';
    exercises.forEach((ex) => {
        const niveauStars = '★'.repeat(ex.niveau || 1);
        html += `<div class="exercise-box" data-exercise="${ex.id}">`;
        html += `<div class="exercise-header"><span class="exercise-niveau">${niveauStars}</span></div>`;
        html += `<div class="exercise-question">${ex.question}</div>`;

        if (ex.type === 'mc') html += renderMC(ex);
        else if (ex.type === 'numeric') html += renderNumeric(ex);
        else if (ex.type === 'matching') html += renderMatching(ex);

        html += `<button class="check-btn" data-id="${ex.id}">Prüfen</button>`;
        html += `<div class="feedback hidden" id="feedback-${ex.id}"></div>`;
        html += `</div>`;
    });
    return html;
}

function renderMC(ex) {
    const letters = ['A', 'B', 'C', 'D'];
    let html = '<div class="mc-options">';
    ex.options.forEach((opt, i) => {
        html += `<div class="mc-option" data-id="${ex.id}" data-index="${i}">
            <span class="letter">${letters[i]})</span><span>${opt}</span></div>`;
    });
    return html + '</div>';
}

function renderNumeric(ex) {
    return `<div class="numeric-input">
        <input type="text" id="input-${ex.id}" placeholder="Wert" inputmode="decimal">
        <span>${ex.unit}</span></div>`;
}

function renderMatching(ex) {
    let html = '<div class="matching-grid">';
    ex.labels.forEach((label, i) => {
        html += `<span class="matching-label">${label}:</span>
            <select class="matching-select" data-id="${ex.id}" data-index="${i}">
            <option value="">– wählen –</option>`;
        ex.options.forEach((opt, oi) => { html += `<option value="${oi}">${opt}</option>`; });
        html += '</select>';
    });
    return html + '</div>';
}

function bindExerciseEvents(exercises) {
    document.querySelectorAll('.mc-option').forEach(opt => {
        opt.addEventListener('click', () => {
            const id = opt.dataset.id;
            document.querySelectorAll(`.mc-option[data-id="${id}"]`).forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            exerciseAnswers[id] = parseInt(opt.dataset.index);
        });
    });

    exercises.filter(e => e.type === 'numeric').forEach(ex => {
        const input = document.getElementById(`input-${ex.id}`);
        if (input) {
            input.addEventListener('input', () => {
                exerciseAnswers[ex.id] = parseFloat(input.value.replace(',', '.'));
            });
        }
    });

    exercises.filter(e => e.type === 'matching').forEach(ex => {
        document.querySelectorAll(`.matching-select[data-id="${ex.id}"]`).forEach(sel => {
            sel.addEventListener('change', () => {
                if (!exerciseAnswers[ex.id]) exerciseAnswers[ex.id] = [];
                exerciseAnswers[ex.id][parseInt(sel.dataset.index)] = sel.value === '' ? null : parseInt(sel.value);
            });
        });
    });

    document.querySelectorAll('.check-btn').forEach(btn => {
        btn.addEventListener('click', () => checkExercise(btn.dataset.id, exercises));
    });
}

function checkExercise(id, exercises) {
    const ex = exercises.find(e => e.id === id);
    const answer = exerciseAnswers[id];
    const feedbackEl = document.getElementById(`feedback-${id}`);
    let correct = false;

    if (ex.type === 'mc') {
        correct = answer === ex.correct;
        document.querySelectorAll(`.mc-option[data-id="${id}"]`).forEach((opt, i) => {
            opt.classList.remove('correct', 'incorrect');
            if (i === ex.correct) opt.classList.add('correct');
            else if (i === answer) opt.classList.add('incorrect');
        });
    } else if (ex.type === 'numeric') {
        correct = answer !== undefined && Math.abs(answer - ex.correct) <= ex.tolerance;
    } else if (ex.type === 'matching') {
        if (Array.isArray(answer) && answer.length === ex.correct.length) {
            correct = answer.every((a, i) => a === ex.correct[i]);
        }
    }

    feedbackEl.classList.remove('hidden', 'correct', 'incorrect');
    feedbackEl.classList.add(correct ? 'correct' : 'incorrect');
    feedbackEl.innerHTML = (correct ? '✓ Richtig! ' : '✗ Leider falsch. ') + ex.feedback;

    const allAnswered = exercises.every(e => {
        const a = exerciseAnswers[e.id];
        if (e.type === 'matching') return Array.isArray(a) && a.every(v => v !== null && v !== undefined);
        return a !== undefined;
    });
    if (allAnswered) {
        completedSteps.add(currentStep);
        updateProgress();
        saveState();
    }
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════ */

function prevStep() {
    if (currentStep > 0) { markCurrentComplete(); renderStep(currentStep - 1); }
}

function nextStep() {
    if (currentStep < LERNPFAD.steps.length - 1) { markCurrentComplete(); renderStep(currentStep + 1); }
    else { markCurrentComplete(); showCompletion(); }
}

function goToStep(index) { renderStep(index); }

function markCurrentComplete() {
    const step = LERNPFAD.steps[currentStep];
    if (step.type === 'content' || step.type === 'simulation') {
        completedSteps.add(currentStep);
        updateProgress();
        saveState();
    }
}

function updateProgress() {
    const pct = (completedSteps.size / LERNPFAD.steps.length) * 100;
    document.getElementById('progressBar').style.width = `${pct}%`;
    document.getElementById('completedSteps').textContent = completedSteps.size;
}

function showCompletion() {
    document.getElementById('stepContainer').innerHTML = `
        <div class="completion-box">
            <div class="completion-title">Lernpfad abgeschlossen!</div>
            <p class="text-muted">Du hast alle 12 Schritte bearbeitet.</p>
            <div class="completion-stats">
                <div class="stat-item"><div class="stat-value">${completedSteps.size}</div><div class="stat-label">Schritte</div></div>
                <div class="stat-item"><div class="stat-value">${Object.keys(exerciseAnswers).length}</div><div class="stat-label">Aufgaben</div></div>
            </div>
            <div class="hefter-hinweis" style="text-align:left;">
                <strong>Kontrolliere dein Arbeitsblatt:</strong>
                <ul>
                    <li>Sind alle Lücken ausgefüllt?</li>
                    <li>Ist die Formel mit allen Größen notiert?</li>
                    <li>Sind die umgestellten Formeln eingetragen?</li>
                    <li>Ist die Beobachtungstabelle komplett?</li>
                    <li>Sind die Merksätze vollständig?</li>
                </ul>
            </div>
            <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;border:1px solid var(--accent);background:var(--accent);color:white;cursor:pointer;">
                Von vorne beginnen
            </button>
        </div>`;
    document.getElementById('btnNext').disabled = true;
}

/* ═══════════════════════════════════════════════════════════════
   STATE PERSISTENCE
═══════════════════════════════════════════════════════════════ */

function saveState() {
    localStorage.setItem(`lernpfad_${LERNPFAD.id}`, JSON.stringify({
        currentStep, completedSteps: Array.from(completedSteps), exerciseAnswers
    }));
}

function loadState() {
    const saved = localStorage.getItem(`lernpfad_${LERNPFAD.id}`);
    if (!saved) return;
    try {
        const data = JSON.parse(saved);
        completedSteps = new Set(data.completedSteps || []);
        exerciseAnswers = data.exerciseAnswers || {};
        if (data.currentStep) renderStep(data.currentStep);
        updateProgress();
    } catch (e) { console.error('Failed to load state:', e); }
}

document.addEventListener('DOMContentLoaded', init);
</script>
