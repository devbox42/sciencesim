<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" style="background:#e8f4fc">
  <title>Países hispanohablantes</title>
  <desc>Weltkarte mit spanischsprachigen Ländern (vereinfacht)</desc>

  <!-- Ozean-Hintergrund bereits im style -->

  <!-- Kontinente (vereinfacht, grau) -->
  <g fill="#d0d0d0" stroke="#999" stroke-width="0.5">
    <!-- Nordamerika -->
    <path d="M120,50 L250,50 L280,100 L300,150 L280,200 L250,220 L200,200 L150,180 L100,120 Z"/>
    <!-- USA -->
    <path d="M150,180 L250,180 L280,200 L280,240 L250,260 L180,270 L130,250 L120,220 Z"/>
    <!-- Südamerika -->
    <path d="M250,280 L300,270 L330,300 L340,350 L330,400 L300,450 L270,470 L250,450 L240,400 L230,350 L240,300 Z"/>
    <!-- Europa -->
    <path d="M450,80 L520,70 L550,90 L560,120 L550,150 L520,160 L480,150 L450,130 Z"/>
    <!-- Afrika -->
    <path d="M450,170 L520,160 L560,200 L570,280 L550,350 L500,380 L450,360 L430,300 L420,230 Z"/>
    <!-- Asien -->
    <path d="M560,60 L750,50 L850,100 L880,180 L850,250 L750,280 L650,250 L580,200 L560,130 Z"/>
    <!-- Australien -->
    <path d="M780,320 L860,310 L900,350 L890,400 L840,420 L790,400 L770,360 Z"/>
  </g>

  <!-- Spanischsprachige Länder (Karminrot #c41e3a) -->
  <g fill="#c41e3a" stroke="#8b1528" stroke-width="0.8">
    <!-- Spanien -->
    <ellipse cx="465" cy="145" rx="18" ry="12"/>

    <!-- Mexiko -->
    <path d="M160,240 L200,230 L220,250 L210,280 L180,290 L150,275 Z"/>

    <!-- Guatemala -->
    <ellipse cx="195" cy="295" rx="8" ry="6"/>
    <!-- Honduras -->
    <ellipse cx="210" cy="292" rx="8" ry="5"/>
    <!-- El Salvador -->
    <ellipse cx="195" cy="302" rx="5" ry="4"/>
    <!-- Nicaragua -->
    <ellipse cx="215" cy="305" rx="8" ry="5"/>
    <!-- Costa Rica -->
    <ellipse cx="210" cy="318" rx="5" ry="4"/>
    <!-- Panamá -->
    <ellipse cx="225" cy="320" rx="7" ry="4"/>

    <!-- Cuba -->
    <path d="M220,265 L250,260 L255,268 L230,275 Z"/>
    <!-- Rep. Dominicana -->
    <ellipse cx="265" cy="275" rx="6" ry="4"/>
    <!-- Puerto Rico -->
    <ellipse cx="278" cy="276" rx="4" ry="3"/>

    <!-- Venezuela -->
    <path d="M270,300 L310,295 L320,315 L295,325 L270,320 Z"/>
    <!-- Colombia -->
    <path d="M245,310 L270,300 L270,330 L260,350 L240,345 L235,325 Z"/>
    <!-- Ecuador -->
    <ellipse cx="235" cy="355" rx="10" ry="12"/>
    <!-- Perú -->
    <path d="M230,370 L255,360 L265,400 L250,430 L225,420 L220,390 Z"/>
    <!-- Bolivia -->
    <path d="M265,390 L290,385 L295,420 L275,435 L260,420 Z"/>
    <!-- Paraguay -->
    <ellipse cx="295" cy="395" rx="10" ry="10"/>
    <!-- Uruguay -->
    <ellipse cx="305" cy="420" rx="6" ry="8"/>
    <!-- Argentina -->
    <path d="M260,430 L290,420 L300,450 L290,480 L270,490 L255,470 L250,445 Z"/>
    <!-- Chile -->
    <path d="M245,430 L255,425 L260,490 L250,500 L240,480 L242,450 Z"/>

    <!-- Guinea Ecuatorial (Afrika) -->
    <ellipse cx="480" cy="315" rx="4" ry="4"/>
  </g>

  <!-- Beschriftungen -->
  <g font-family="Arial, sans-serif" font-size="11" fill="#333">
    <!-- Spanien -->
    <text x="465" y="168" text-anchor="middle" font-weight="bold">España</text>

    <!-- Nordamerika -->
    <text x="180" y="265" text-anchor="middle" font-weight="bold">México</text>

    <!-- Zentralamerika -->
    <text x="210" cy="340" text-anchor="middle" font-size="9">Centroamérica</text>

    <!-- Karibik -->
    <text x="250" y="255" text-anchor="middle" font-size="9">Cuba</text>

    <!-- Südamerika -->
    <text x="290" y="310" text-anchor="middle" font-size="9">Venezuela</text>
    <text x="255" y="330" text-anchor="middle" font-size="9">Colombia</text>
    <text x="245" y="400" text-anchor="middle" font-size="9">Perú</text>
    <text x="270" y="465" text-anchor="middle" font-weight="bold">Argentina</text>
    <text x="245" y="460" text-anchor="middle" font-size="9">Chile</text>

    <!-- Afrika -->
    <text x="480" y="335" text-anchor="middle" font-size="8">Guinea Ec.</text>
  </g>

  <!-- Legende -->
  <g transform="translate(800,400)">
    <rect x="0" y="0" width="180" height="80" fill="white" stroke="#ccc" rx="3"/>
    <rect x="15" y="20" width="20" height="15" fill="#c41e3a" stroke="#8b1528"/>
    <text x="45" y="32" font-family="Arial" font-size="12" fill="#333">Países hispanohablantes</text>
    <text x="15" y="55" font-family="Arial" font-size="10" fill="#666">≈ 500 millones de hablantes</text>
    <text x="15" y="70" font-family="Arial" font-size="10" fill="#666">21 países oficiales</text>
  </g>

  <!-- Titel -->
  <text x="500" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#c41e3a">
    El mundo hispanohablante
  </text>
</svg>
