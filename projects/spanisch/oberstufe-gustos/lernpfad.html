<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me gusta - Lernpfad | Spanisch Oberstufe</title>
    <style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN SYSTEM - Lernpfad: Me gusta (Spanisch)
═══════════════════════════════════════════════════════════════ */

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --accent: #c41e3a;
    --accent-light: #fce8ec;
    --accent-dark: #8b1528;
    --bg: #f5f5f5;
    --white: #ffffff;
    --border: #dddddd;
    --border-light: #eeeeee;
    --text-primary: #222222;
    --text-secondary: #555555;
    --text-muted: #888888;
    --success: #2a7a4b;
    --success-bg: #e8f5e9;
    --warning: #b35c00;
    --warning-bg: #fff3e0;
    --error: #c62828;
    --error-bg: #ffebee;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
}

.container { max-width: 900px; margin: 0 auto; }

/* Header */
header {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 15px 20px;
    margin-bottom: 15px;
}
header h1 { font-size: 1.4em; font-weight: 600; margin-bottom: 5px; }
.breadcrumb { font-size: 0.85em; color: var(--text-muted); }
.breadcrumb a { color: var(--accent); text-decoration: none; }

/* Progress */
.progress-container {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 12px 15px;
    margin-bottom: 15px;
}
.progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.9em;
}
.progress-label { color: var(--text-secondary); }
.progress-count { font-weight: 600; color: var(--accent); }
.progress-bar { width: 100%; height: 8px; background: var(--border-light); }
.progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
.step-indicators { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
.step-dot {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7em; font-weight: 600;
    border: 2px solid var(--border);
    background: var(--white);
    cursor: pointer;
}
.step-dot.completed { background: var(--success); border-color: var(--success); color: var(--white); }
.step-dot.current { border-color: var(--accent); border-width: 3px; color: var(--accent); }
.step-dot.content { border-style: solid; }
.step-dot.exercise { border-style: dashed; }
.step-dot.test { background: var(--accent-light); }

/* Step Content */
.step-container {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 15px;
}
.step-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--accent);
}
.step-title { font-size: 1.1em; font-weight: 600; }
.step-type {
    font-size: 0.8em;
    padding: 3px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
}
.step-type.content { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.step-type.exercise { background: var(--success-bg); color: var(--success); border-color: var(--success); }
.step-type.test { background: var(--warning-bg); color: var(--warning); border-color: var(--warning); }

.step-body { font-size: 0.95em; line-height: 1.7; }
.step-body p { margin-bottom: 12px; }
.step-body h3 { font-size: 1em; font-weight: 600; margin: 20px 0 10px 0; }
.step-body ul, .step-body ol { margin: 10px 0 10px 25px; }
.step-body li { margin-bottom: 5px; }

/* Spanish text highlight */
.es {
    color: var(--accent);
    font-weight: 500;
}
.de {
    color: var(--text-muted);
    font-style: italic;
}

/* Grammar Box */
.grammar-box {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    padding: 15px;
    margin: 15px 0;
    font-family: "SF Mono", Monaco, monospace;
    font-size: 0.9em;
}
.grammar-box .highlight {
    background: var(--accent);
    color: white;
    padding: 1px 4px;
}

/* Comparison Box */
.comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin: 15px 0;
}
.comparison-col {
    padding: 12px;
    border: 1px solid var(--border);
}
.comparison-col.correct { border-color: var(--success); background: var(--success-bg); }
.comparison-col.incorrect { border-color: var(--error); background: var(--error-bg); }
.comparison-col h4 { font-size: 0.85em; color: var(--text-muted); margin-bottom: 8px; }

/* Info & Merksatz */
.info-box {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    padding: 12px 15px;
    margin: 15px 0;
    font-size: 0.9em;
}
.info-box strong { color: var(--accent); }

.merksatz {
    background: var(--success-bg);
    border-left: 3px solid var(--success);
    padding: 12px 15px;
    margin: 15px 0;
    font-size: 0.95em;
}
.merksatz strong { color: var(--success); }

/* Fehler-Box */
.fehler-box {
    background: var(--error-bg);
    border-left: 3px solid var(--error);
    padding: 12px 15px;
    margin: 15px 0;
    font-size: 0.9em;
}
.fehler-box::before {
    content: "Typische Fehler";
    display: block;
    font-weight: 600;
    color: var(--error);
    margin-bottom: 8px;
}
.fehler-box table { width: 100%; border-collapse: collapse; }
.fehler-box td { padding: 4px 8px; border-bottom: 1px solid #f5c6cb; }
.fehler-box .wrong { color: var(--error); text-decoration: line-through; }
.fehler-box .right { color: var(--success); }

/* HEFTER-HINWEIS BOX */
.hefter-hinweis {
    background: var(--warning-bg);
    border: 2px solid var(--warning);
    padding: 12px 15px;
    margin: 20px 0;
    font-size: 0.9em;
}
.hefter-hinweis::before {
    content: "Arbeitsblatt";
    display: inline-block;
    background: var(--warning);
    color: white;
    font-size: 0.75em;
    font-weight: 600;
    padding: 2px 8px;
    margin-bottom: 8px;
}
.hefter-hinweis ul { margin: 8px 0 0 20px; }
.hefter-hinweis li { margin-bottom: 4px; }

/* Vocab Table */
.vocab-table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
    font-size: 0.9em;
}
.vocab-table th, .vocab-table td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
}
.vocab-table th { background: var(--bg); font-weight: 600; }
.vocab-table td.es { color: var(--accent); font-weight: 500; }

/* Exercise */
.exercise-box {
    border: 1px solid var(--border);
    padding: 15px;
    margin: 15px 0;
    background: var(--white);
}
.exercise-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}
.exercise-niveau { font-size: 0.85em; color: var(--text-muted); }
.exercise-question { font-weight: 500; margin-bottom: 12px; }

.mc-options { display: flex; flex-direction: column; gap: 8px; }
.mc-option {
    display: flex;
    align-items: flex-start;
    padding: 10px 12px;
    border: 1px solid var(--border);
    cursor: pointer;
}
.mc-option:hover { background: var(--bg); }
.mc-option.selected { background: var(--accent-light); border-color: var(--accent); }
.mc-option.correct { background: var(--success-bg); border-color: var(--success); }
.mc-option.incorrect { background: var(--error-bg); border-color: var(--error); }
.mc-option .letter { font-weight: 600; margin-right: 10px; color: var(--text-secondary); }

.fill-blank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin: 10px 0;
}
.fill-blank input {
    padding: 8px 12px;
    font-size: 1em;
    border: 1px solid var(--border);
    width: 100px;
    text-align: center;
}
.fill-blank input:focus { outline: none; border-color: var(--accent); }
.fill-blank span { font-size: 0.95em; }

.check-btn {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 0.9em;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: var(--white);
    cursor: pointer;
}
.check-btn:hover { background: var(--accent-dark); }

.feedback { margin-top: 15px; padding: 12px; font-size: 0.9em; }
.feedback.correct { background: var(--success-bg); border-left: 3px solid var(--success); }
.feedback.incorrect { background: var(--error-bg); border-left: 3px solid var(--error); }

/* Test Results */
.test-result {
    text-align: center;
    padding: 20px;
    margin-top: 20px;
    border: 2px solid var(--border);
}
.test-result.pass { border-color: var(--success); background: var(--success-bg); }
.test-result.fail { border-color: var(--error); background: var(--error-bg); }
.test-score { font-size: 2em; font-weight: 700; }

/* Navigation */
.nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: var(--white);
    border: 1px solid var(--border);
}
.nav-row button {
    padding: 10px 20px;
    font-size: 0.9em;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
}
.nav-row button:hover:not(:disabled) { background: var(--bg); }
.nav-row button:disabled { opacity: 0.4; cursor: not-allowed; }
.nav-row button.primary { background: var(--accent); color: var(--white); border-color: var(--accent); }
.nav-row button.primary:hover:not(:disabled) { background: var(--accent-dark); }
.nav-info { font-size: 0.9em; color: var(--text-muted); }

.hidden { display: none !important; }
    </style>
</head>

<div class="container">
    <header>
        <h1 id="pathTitle">Me gusta - Lernpfad</h1>
        <p class="breadcrumb">

    <div class="progress-container">
        <div class="progress-header">
            <span class="progress-label">Fortschritt:</span>
            <span class="progress-count"><span id="completedSteps">0</span> / <span id="totalSteps">9</span> Schritte</span>
        </div>
        <div class="progress-bar">
            <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>

    <div id="stepContainer"></div>

    <div class="nav-row">
        <button id="btnPrev" disabled>← Zurück</button>
        <span class="nav-info">Schritt <span id="currentStep">1</span> von <span id="totalStepsNav">9</span></span>
        <button id="btnNext" class="primary">Weiter →</button>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   LERNPFAD: ME GUSTA (Spanisch Oberstufe)
   9 Schritte, 45 Minuten
═══════════════════════════════════════════════════════════════ */

const LERNPFAD = {
    id: "spanisch-gustos",
    title: "Me gusta - Lernpfad",
    subject: "spanisch",
    level: "Oberstufe Spätbeginner",

    steps: [
        // ═══════════════════════════════════════════════════════════════
        // SCHRITT 1: Einstieg
        // ═══════════════════════════════════════════════════════════════
        {
            type: "content",
            title: "1. ¿Qué te gusta?",
            content: `
                <div class="info-box" style="background:#fff3e0;border-color:#b35c00;">
                    <strong style="color:#b35c00;">Wusstest du?</strong><br>
                    Auf Spanisch kannst du <em>nicht</em> sagen: "Ich mag dich." ❤️<br>
                    Stattdessen sagst du: <span class="es">Me gustas.</span> – wörtlich: "Du gefällst mir."<br>
                    <strong>Das Subjekt ist immer das, was gefällt – nie die Person, die mag!</strong>
                </div>

                <p>Heute lernst du, wie man auf Spanisch über <strong>Vorlieben</strong> spricht.</p>

                <div class="info-box">
                    <strong>Schau dir diese Sätze an:</strong><br><br>
                    <span class="es">Me gusta la música.</span> <span class="de">– Mir gefällt die Musik.</span><br>
                    <span class="es">Me gusta bailar.</span> <span class="de">– Mir gefällt das Tanzen.</span><br>
                    <span class="es">Me gustan los deportes.</span> <span class="de">– Mir gefallen die Sportarten.</span>
                </div>

                <p>Fällt dir etwas auf? Im Deutschen sagen wir oft:</p>
                <ul>
                    <li>"Ich <strong>mag</strong> Musik." (Subjekt = ich)</li>
                    <li>"Ich <strong>mag</strong> tanzen."</li>
                </ul>

                <p>Aber im Spanischen funktioniert <span class="es">gustar</span> ganz anders!</p>

                <div class="merksatz">
                    <strong>Wichtig:</strong> <span class="es">Gustar</span> funktioniert wie <strong>"gefallen"</strong>, nicht wie "mögen"!
                </div>
            `
        },

        // ═══════════════════════════════════════════════════════════════
        // SCHRITT 2: Das Verb verstehen
        // ═══════════════════════════════════════════════════════════════
        {
            type: "content",
            title: "2. Gustar = Gefallen",
            content: `
                <h3>Der entscheidende Unterschied</h3>

                <div class="comparison">
                    <div class="comparison-col incorrect">
                        <h4>❌ FALSCH (wie "mögen")</h4>
                        <p><span class="es">*Yo gusto música.</span></p>
                        <p class="de">Ich mag Musik.</p>
                        <p style="color:var(--error);font-size:0.85em;">So funktioniert es NICHT!</p>
                    </div>
                    <div class="comparison-col correct">
                        <h4>✓ RICHTIG (wie "gefallen")</h4>
                        <p><span class="es">Me gusta la música.</span></p>
                        <p class="de">Mir gefällt die Musik.</p>
                        <p style="color:var(--success);font-size:0.85em;">Die Musik ist das Subjekt!</p>
                    </div>
                </div>

                <h3>Wer ist das Subjekt?</h3>
                <p>Das ist der Schlüssel! Schau dir das Diagramm an:</p>

                <div style="text-align:center;margin:20px 0;">
                    <svg width="380" height="140" viewBox="0 0 380 140" style="max-width:100%;">
                        <!-- Hintergrund -->
                        <rect x="10" y="50" width="360" height="50" rx="2" fill="#fce8ec" stroke="#c41e3a" stroke-width="1"/>

                        <!-- Satzteile -->
                        <text x="60" y="82" text-anchor="middle" font-size="18" fill="#c41e3a" font-weight="bold" font-family="sans-serif">Me</text>
                        <text x="140" y="82" text-anchor="middle" font-size="18" fill="#222" font-family="sans-serif">gusta</text>
                        <text x="260" y="82" text-anchor="middle" font-size="18" fill="#c41e3a" font-weight="bold" font-family="sans-serif">la música</text>

                        <!-- Pfeil von Subjekt zum Verb -->
                        <path d="M 260 55 Q 260 30 180 30 Q 140 30 140 50" stroke="#2a7a4b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
                        <defs>
                            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                <path d="M0,0 L0,6 L9,3 z" fill="#2a7a4b"/>
                            </marker>
                        </defs>

                        <!-- Labels -->
                        <text x="60" y="125" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">WEM?</text>
                        <text x="60" y="138" text-anchor="middle" font-size="10" fill="#888" font-family="sans-serif">(Dativ)</text>
                        <text x="260" y="20" text-anchor="middle" font-size="12" fill="#2a7a4b" font-weight="bold" font-family="sans-serif">SUBJEKT</text>
                        <text x="260" y="125" text-anchor="middle" font-size="11" fill="#555" font-family="sans-serif">WAS gefällt?</text>
                        <text x="260" y="138" text-anchor="middle" font-size="10" fill="#888" font-family="sans-serif">(bestimmt Verbform!)</text>

                        <!-- Verb-Erklärung -->
                        <text x="140" y="125" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">richtet sich</text>
                        <text x="140" y="138" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">nach Subjekt</text>
                    </svg>
                </div>

                <div class="grammar-box">
                    <strong>Deutsch:</strong> <span class="highlight">Mir</span> gefällt <span class="highlight">die Musik</span>.<br>
                    <strong>Spanisch:</strong> <span class="highlight">Me</span> gusta <span class="highlight">la música</span>.<br><br>
                    → <strong>La música</strong> ist das SUBJEKT (sie "tut" etwas: sie gefällt)<br>
                    → <strong>Me</strong> ist der Empfänger (wem gefällt sie?)
                </div>

                <div class="merksatz">
                    <strong>Kernregel:</strong><br>
                    • <span class="es">gusta</span> + Singular oder Infinitiv<br>
                    • <span class="es">gustan</span> + Plural<br><br>
                    Das Verb richtet sich nach dem, WAS gefällt – nicht nach der Person!
                </div>

                <div class="fehler-box">
                    <table>
                        <tr><td class="wrong">*Yo gusto música.</td><td>→ "Ich" ist nicht das Subjekt!</td></tr>
                        <tr><td class="wrong">*Me gusta los libros.</td><td>→ Plural "los libros" braucht <span class="right">gustan</span></td></tr>
                        <tr><td class="wrong">*Me gustan bailar.</td><td>→ Infinitiv braucht <span class="right">gusta</span></td></tr>
                    </table>
                </div>

                <div class="hefter-hinweis">
                    <strong>Arbeitsblatt:</strong>
                    <ul>
                        <li><strong>Kasten 1:</strong> Übertrage die Struktur-Erklärung</li>
                        <li>Merke: gustar = gefallen, NICHT mögen!</li>
                    </ul>
                </div>
            `
        },

        // ═══════════════════════════════════════════════════════════════
        // SCHRITT 3: Verständnisübung
        // ═══════════════════════════════════════════════════════════════
        {
            type: "exercise",
            title: "3. Übung: Verstanden?",
            exercises: [
                {
                    id: "v1",
                    type: "mc",
                    question: "Warum heißt es <span class='es'>Me gusta la música</span> und nicht <span class='es'>*Yo gusto música</span>?",
                    options: [
                        "Weil 'gustar' wie 'mögen' funktioniert",
                        "Weil 'gustar' wie 'gefallen' funktioniert – die Musik gefällt mir",
                        "Weil Spanisch keine Subjekte hat",
                        "Weil 'yo' nur in Fragen verwendet wird"
                    ],
                    correct: 1,
                    feedback: "Genau! 'Gustar' funktioniert wie 'gefallen'. Das Subjekt ist 'la música' (die Musik), nicht 'ich'."
                },
                {
                    id: "v2",
                    type: "mc",
                    question: "Was ist das Subjekt in <span class='es'>Me gustan los libros</span>?",
                    options: [
                        "Me (ich/mir)",
                        "Gustan (das Verb)",
                        "Los libros (die Bücher)",
                        "Es gibt kein Subjekt"
                    ],
                    correct: 2,
                    feedback: "Richtig! 'Los libros' ist das Subjekt. Deshalb steht das Verb im Plural: gustan."
                }
            ]
        },

        // ═══════════════════════════════════════════════════════════════
        // SCHRITT 4: Konjugation
        // ═══════════════════════════════════════════════════════════════
        {
            type: "content",
            title: "4. Die Pronomen",
            content: `
                <h3>Die wichtigen Pronomen</h3>

                <table class="vocab-table">
                    <tr><th>Pronomen</th><th>Beispiel</th><th>Deutsch</th></tr>
                    <tr><td class="es">me</td><td class="es">me gusta / gustan</td><td>mir gefällt/gefallen</td></tr>
                    <tr><td class="es">te</td><td class="es">te gusta / gustan</td><td>dir gefällt/gefallen</td></tr>
                    <tr><td class="es">le</td><td class="es">le gusta / gustan</td><td>ihm/ihr/Ihnen gefällt/gefallen</td></tr>
                    <tr><td class="es">nos</td><td class="es">nos gusta / gustan</td><td>uns gefällt/gefallen</td></tr>
                    <tr><td class="es">os</td><td class="es">os gusta / gustan</td><td>euch gefällt/gefallen</td></tr>
                    <tr><td class="es">les</td><td class="es">les gusta / gustan</td><td>ihnen/Ihnen gefällt/gefallen</td></tr>
                </table>

                <div class="info-box">
                    <strong>Wann gusta, wann gustan?</strong><br><br>
                    <span class="es">Me <strong>gusta</strong> el libro.</span> → Singular<br>
                    <span class="es">Me <strong>gusta</strong> leer.</span> → Infinitiv<br>
                    <span class="es">Me <strong>gustan</strong> los libros.</span> → Plural
                </div>

                <h3>Wozu "a mí", "a ti", "a él"...?</h3>

                <p>Diese Formen sind <strong>optional</strong> – aber manchmal wichtig!</p>

                <div class="grammar-box">
                    <strong>1. Zur Betonung (Kontrast):</strong><br>
                    <span class="es"><span class="highlight">A mí</span> me gusta el café, pero <span class="highlight">a ti</span> no.</span><br>
                    <span class="de">MIR gefällt Kaffee, aber DIR nicht.</span><br><br>

                    <strong>2. Zur Klarstellung bei le/les:</strong><br>
                    <span class="es">Le gusta bailar.</span> → Wem? Ihm? Ihr? Ihnen?<br>
                    <span class="es"><span class="highlight">A María</span> le gusta bailar.</span> → Klar: María!<br>
                    <span class="es"><span class="highlight">A ellos</span> les gusta viajar.</span> → Klar: ihnen (Plural)
                </div>

                <div class="merksatz">
                    <strong>Merke:</strong><br>
                    • <span class="es">me, te, nos, os</span> → eindeutig, "a mí/a ti..." meist unnötig<br>

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */

let currentStep = 0;
let completedSteps = new Set();
let exerciseAnswers = {};
let testScore = 0;

/* ═══════════════════════════════════════════════════════════════
   INITIALIZATION
═══════════════════════════════════════════════════════════════ */

function init() {
    document.getElementById('pathTitle').textContent = LERNPFAD.title;
    document.getElementById('totalSteps').textContent = LERNPFAD.steps.length;
    document.getElementById('totalStepsNav').textContent = LERNPFAD.steps.length;
    generateStepIndicators();
    renderStep(0);
    bindEvents();
}

function generateStepIndicators() {
    const container = document.getElementById('stepIndicators');
    container.innerHTML = '';
    LERNPFAD.steps.forEach((step, i) => {
        const dot = document.createElement('div');
        dot.className = `step-dot ${step.type}`;
        if (i === 0) dot.classList.add('current');
        dot.textContent = i + 1;
        dot.dataset.index = i;
        dot.addEventListener('click', () => goToStep(i));
        container.appendChild(dot);
    });
}

function bindEvents() {
    document.getElementById('btnPrev').addEventListener('click', prevStep);
    document.getElementById('btnNext').addEventListener('click', nextStep);
}

/* ═══════════════════════════════════════════════════════════════
   STEP RENDERING
═══════════════════════════════════════════════════════════════ */

function renderStep(index) {
    currentStep = index;
    const step = LERNPFAD.steps[index];
    const container = document.getElementById('stepContainer');

    let html = `
        <div class="step-container">
            <div class="step-header">
                <span class="step-title">${step.title}</span>
                <span class="step-type ${step.type}">${getTypeLabel(step.type)}</span>
            </div>
            <div class="step-body">
    `;

    switch (step.type) {
        case 'content':
            html += step.content;
            break;
        case 'exercise':
            if (step.intro) html += step.intro;
            html += renderExercises(step.exercises);
            break;
        case 'test':
            if (step.intro) html += step.intro;
            html += renderTest(step.exercises);
            break;
    }

    html += '</div></div>';
    container.innerHTML = html;

    document.getElementById('btnPrev').disabled = index === 0;
    document.getElementById('btnNext').textContent = index === LERNPFAD.steps.length - 1 ? 'Abschließen' : 'Weiter →';
    document.getElementById('currentStep').textContent = index + 1;

    document.querySelectorAll('.step-dot').forEach((dot, i) => {
        dot.classList.toggle('current', i === index);
        dot.classList.toggle('completed', completedSteps.has(i));
    });

    if (step.type === 'exercise') {
        bindExerciseEvents(step.exercises);
    } else if (step.type === 'test') {
        bindTestEvents(step.exercises);
    }

    updateProgress();
}

function getTypeLabel(type) {
    switch (type) {
        case 'content': return 'Inhalt';
        case 'exercise': return 'Übung';
        case 'test': return 'Test';
        default: return type;
    }
}

/* ═══════════════════════════════════════════════════════════════
   EXERCISES
═══════════════════════════════════════════════════════════════ */

function renderExercises(exercises) {
    let html = '';
    exercises.forEach((ex) => {
        html += `<div class="exercise-box" data-exercise="${ex.id}">`;
        html += `<div class="exercise-question">${ex.question || ''}</div>`;

        if (ex.type === 'mc') html += renderMC(ex);
        else if (ex.type === 'fill') html += renderFill(ex);
        else if (ex.type === 'translate') html += renderTranslate(ex);

        html += `<button class="check-btn" data-id="${ex.id}">Prüfen</button>`;
        html += `<div class="feedback hidden" id="feedback-${ex.id}"></div>`;
        html += `</div>`;
    });
    return html;
}

function renderMC(ex) {
    const letters = ['A', 'B', 'C', 'D'];
    let html = '<div class="mc-options">';
    ex.options.forEach((opt, i) => {
        html += `<div class="mc-option" data-id="${ex.id}" data-index="${i}">
            <span class="letter">${letters[i]})</span><span>${opt}</span></div>`;
    });
    return html + '</div>';
}

function renderFill(ex) {
    return `
        <div class="fill-blank">
            <input type="text" id="input-${ex.id}" placeholder="..." autocomplete="off">
            <span>${ex.sentence.replace('_____', '______')}</span>
            ${ex.hint ? `<span class="de">${ex.hint}</span>` : ''}
        </div>
    `;
}

function renderTranslate(ex) {
    return `
        <div style="margin:10px 0;">
            <input type="text" id="input-${ex.id}" placeholder="Schreibe hier..." autocomplete="off"
                   style="width:100%;padding:10px;font-size:1em;border:1px solid var(--border);">
            ${ex.hint ? `<p class="de" style="font-size:0.85em;margin-top:5px;">${ex.hint}</p>` : ''}
        </div>
    `;
}

function bindExerciseEvents(exercises) {
    document.querySelectorAll('.mc-option').forEach(opt => {
        opt.addEventListener('click', () => {
            const id = opt.dataset.id;
            document.querySelectorAll(`.mc-option[data-id="${id}"]`).forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            exerciseAnswers[id] = parseInt(opt.dataset.index);
        });
    });

    exercises.filter(e => e.type === 'fill' || e.type === 'translate').forEach(ex => {
        const input = document.getElementById(`input-${ex.id}`);
        if (input) {
            input.addEventListener('input', () => {
                exerciseAnswers[ex.id] = input.value.trim();
            });
        }
    });

    document.querySelectorAll('.check-btn').forEach(btn => {
        btn.addEventListener('click', () => checkExercise(btn.dataset.id, exercises));
    });
}

function checkExercise(id, exercises) {
    const ex = exercises.find(e => e.id === id);
    const answer = exerciseAnswers[id];
    const feedbackEl = document.getElementById(`feedback-${id}`);
    let correct = false;

    if (ex.type === 'mc') {
        correct = answer === ex.correct;
        document.querySelectorAll(`.mc-option[data-id="${id}"]`).forEach((opt, i) => {
            opt.classList.remove('correct', 'incorrect');
            if (i === ex.correct) opt.classList.add('correct');
            else if (i === answer) opt.classList.add('incorrect');
        });
    } else if (ex.type === 'fill') {
        correct = answer && answer.toLowerCase() === ex.blank.toLowerCase();
    } else if (ex.type === 'translate') {
        // For translate: show solution, let student self-assess
        const userAnswer = answer || "(keine Eingabe)";
        const isMatch = answer && answer.toLowerCase().replace(/[.!?]/g, '').trim() ===
                        ex.solution.toLowerCase().replace(/[.!?]/g, '').trim();
        correct = isMatch;
        feedbackEl.classList.remove('hidden', 'correct', 'incorrect');
        feedbackEl.classList.add(isMatch ? 'correct' : 'incorrect');
        feedbackEl.innerHTML = `
            <strong>Deine Antwort:</strong> ${userAnswer}<br>
            <strong>Musterlösung:</strong> <span class="es">${ex.solution}</span><br>
            ${isMatch ? '✓ Perfekt!' : 'Vergleiche deine Antwort mit der Musterlösung.'}
        `;
        exerciseAnswers[id] = answer || 'checked'; // Mark as answered
        checkStepCompletion(exercises);
        return;
    }

    feedbackEl.classList.remove('hidden', 'correct', 'incorrect');
    feedbackEl.classList.add(correct ? 'correct' : 'incorrect');
    feedbackEl.innerHTML = (correct ? '✓ Correcto! ' : '✗ Incorrecto. ') + (ex.feedback || '');

    checkStepCompletion(exercises);
}

function checkStepCompletion(exercises) {
    const allAnswered = exercises.every(e => exerciseAnswers[e.id] !== undefined);
    if (allAnswered) {
        completedSteps.add(currentStep);
        updateProgress();
    }
}

/* ═══════════════════════════════════════════════════════════════
   TEST
═══════════════════════════════════════════════════════════════ */

function renderTest(exercises) {
    let html = '<div id="testQuestions">';
    exercises.forEach((ex, i) => {
        html += `<div class="exercise-box" data-exercise="${ex.id}">`;
        html += `<div class="exercise-question"><strong>${i + 1}.</strong> ${ex.question}</div>`;
        html += renderMC(ex);
        html += `</div>`;
    });
    html += '</div>';
    html += '<button class="check-btn" id="submitTest" style="width:100%;margin-top:20px;">Test auswerten</button>';
    html += '<div id="testResult" class="hidden"></div>';
    return html;
}

function bindTestEvents(exercises) {
    document.querySelectorAll('.mc-option').forEach(opt => {
        opt.addEventListener('click', () => {
            const id = opt.dataset.id;
            document.querySelectorAll(`.mc-option[data-id="${id}"]`).forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            exerciseAnswers[id] = parseInt(opt.dataset.index);
        });
    });

    document.getElementById('submitTest').addEventListener('click', () => evaluateTest(exercises));
}

function evaluateTest(exercises) {
    let score = 0;
    let total = exercises.length;

    exercises.forEach(ex => {
        const answer = exerciseAnswers[ex.id];
        const correct = answer === ex.correct;
        if (correct) score++;

        document.querySelectorAll(`.mc-option[data-id="${ex.id}"]`).forEach((opt, i) => {
            opt.classList.remove('correct', 'incorrect');
            if (i === ex.correct) opt.classList.add('correct');
            else if (i === answer && !correct) opt.classList.add('incorrect');
        });
    });

    testScore = score;
    const percentage = Math.round((score / total) * 100);
    const passed = percentage >= 67;

    const resultDiv = document.getElementById('testResult');
    resultDiv.classList.remove('hidden');
    resultDiv.innerHTML = `
        <div class="test-result ${passed ? 'pass' : 'fail'}">
            <div class="test-score">${score} / ${total}</div>
            <p>${percentage}% – ${passed ? '¡Muy bien! Du hast bestanden!' : 'Noch nicht bestanden. Wiederhole die Schritte.'}</p>
        </div>
    `;

    document.getElementById('submitTest').disabled = true;
    completedSteps.add(currentStep);
    updateProgress();
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════ */

function prevStep() {
    if (currentStep > 0) { markCurrentComplete(); renderStep(currentStep - 1); }
}

function nextStep() {
    if (currentStep < LERNPFAD.steps.length - 1) { markCurrentComplete(); renderStep(currentStep + 1); }
    else { markCurrentComplete(); showCompletion(); }
}

function goToStep(index) { renderStep(index); }

function markCurrentComplete() {
    const step = LERNPFAD.steps[currentStep];
    if (step.type === 'content') {
        completedSteps.add(currentStep);
        updateProgress();
    }
}

function updateProgress() {
    const pct = (completedSteps.size / LERNPFAD.steps.length) * 100;
    document.getElementById('progressBar').style.width = `${pct}%`;
    document.getElementById('completedSteps').textContent = completedSteps.size;
}

function showCompletion() {
    document.getElementById('stepContainer').innerHTML = `
        <div class="step-container" style="text-align:center;">
            <h2 style="color:var(--success);">¡Felicidades!</h2>
            <p>Du hast den Lernpfad abgeschlossen.</p>
            <p style="margin-top:15px;">Testergebnis: <strong>${testScore} / 6</strong></p>
            <div class="hefter-hinweis" style="text-align:left;margin-top:20px;">
                <strong>Arbeitsblatt – Kontrolle:</strong>
                <ul>
                    <li>Kasten 1 + 2 vollständig?</li>
                    <li>Übung 1-4 bearbeitet?</li>
                    <li>3 eigene Sätze geschrieben?</li>
                </ul>
            </div>
            <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;border:1px solid var(--accent);background:var(--accent);color:white;cursor:pointer;">
                Von vorne beginnen
            </button>
        </div>`;
    document.getElementById('btnNext').disabled = true;
}

document.addEventListener('DOMContentLoaded', init);
