<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Code: Stundenleistung</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fff;
            padding: 40px;
        }

        h1 {
            color: #c41e3a;
            font-size: 3em;
            margin-bottom: 30px;
            text-align: center;
        }

        .qr-container {
            background: #fff;
            padding: 30px;
            border: 4px solid #c41e3a;
        }

        .qr-container img {
            width: 400px;
            height: 400px;
        }

        .url {
            margin-top: 30px;
            font-size: 1.2em;
            color: #555;
            text-align: center;
            word-break: break-all;
            max-width: 600px;
        }

        .url a {
            color: #c41e3a;
            text-decoration: none;
        }

        .hint {
            margin-top: 20px;
            font-size: 1.5em;
            color: #888;
        }

        .info {
            margin-top: 30px;
            padding: 15px 30px;
            background: #fdf2f4;
            border: 2px solid #c41e3a;
            font-size: 1.3em;
        }

        @media print {
            body { padding: 20px; }
            h1 { font-size: 2.5em; }
            .qr-container img { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

<h1>Stundenleistung: Repaso Unidad 5 + Números</h1>

<div class="qr-container">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://devbox42.github.io/sciencesim/spanisch/kl08/unidad5-repaso-numeros/TEST-repaso-numeros.html" alt="QR-Code Test">
</div>

<p class="url">
    <a href="https://devbox42.github.io/sciencesim/spanisch/kl08/unidad5-repaso-numeros/TEST-repaso-numeros.html" target="_blank">
        devbox42.github.io/sciencesim/spanisch/kl08/.../TEST-repaso-numeros.html
    </a>
</p>

<p class="hint">Scanne den QR-Code mit deinem Gerät</p>

<div class="info">
    <strong>Wichtig:</strong> Wähle zuerst deine Platznummer (P1-P30)!
</div>

</body>
</html>
