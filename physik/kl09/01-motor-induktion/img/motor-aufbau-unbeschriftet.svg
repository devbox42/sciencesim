<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
    <!-- Gleichstrommotor - Aufbau (unbeschriftet für Beschriftungsaufgabe) -->
    <!-- Quelle: Eigene Darstellung nach LEIFIphysik-Vorlage -->

    <!-- Magnet (Stator) -->
    <rect x="50" y="80" width="25" height="130" fill="#c62828" stroke="#333" stroke-width="2"/>
    <text x="62" y="150" text-anchor="middle" fill="white" font-weight="bold" font-size="12">N</text>
    <rect x="325" y="80" width="25" height="130" fill="#1565c0" stroke="#333" stroke-width="2"/>
    <text x="337" y="150" text-anchor="middle" fill="white" font-weight="bold" font-size="12">S</text>

    <!-- Label 1: Stator -->
    <line x1="62" y1="70" x2="62" y2="50" stroke="#333"/>
    <circle cx="62" cy="40" r="10" fill="white" stroke="#333" stroke-width="1"/>
    <text x="62" y="44" text-anchor="middle" font-size="11" font-weight="bold">1</text>

    <!-- Rotor -->
    <rect x="150" y="100" width="100" height="80" fill="none" stroke="#b35c00" stroke-width="4" rx="3"/>
    <line x1="200" y1="95" x2="200" y2="60" stroke="#666" stroke-width="3"/>
    <circle cx="200" cy="55" r="5" fill="#666"/>

    <!-- Label 2: Rotor -->
    <line x1="255" y1="140" x2="280" y2="140" stroke="#333"/>
    <circle cx="290" cy="140" r="10" fill="white" stroke="#333" stroke-width="1"/>
    <text x="290" y="144" text-anchor="middle" font-size="11" font-weight="bold">2</text>

    <!-- Kommutator -->
    <path d="M 185 200 A 20 20 0 0 1 215 200" fill="#b35c00" stroke="#333" stroke-width="1"/>
    <path d="M 185 200 A 20 20 0 0 0 215 200" fill="#d4a574" stroke="#333" stroke-width="1"/>

    <!-- Label 3: Kommutator -->
    <line x1="200" y1="225" x2="200" y2="250" stroke="#333"/>
    <circle cx="200" cy="260" r="10" fill="white" stroke="#333" stroke-width="1"/>
    <text x="200" y="264" text-anchor="middle" font-size="11" font-weight="bold">3</text>

    <!-- Bürsten -->
    <rect x="165" y="205" width="8" height="20" fill="#333"/>
    <rect x="227" y="205" width="8" height="20" fill="#333"/>

    <!-- Label 4: Bürsten -->
    <line x1="169" y1="230" x2="130" y2="250" stroke="#333"/>
    <circle cx="120" cy="260" r="10" fill="white" stroke="#333" stroke-width="1"/>
    <text x="120" y="264" text-anchor="middle" font-size="11" font-weight="bold">4</text>

    <!-- Stromzufuhr -->
    <line x1="169" y1="225" x2="169" y2="235" stroke="#c62828" stroke-width="2"/>
    <text x="155" y="245" fill="#c62828" font-size="10" font-weight="bold">+</text>
    <line x1="231" y1="225" x2="231" y2="235" stroke="#1565c0" stroke-width="2"/>
    <text x="245" y="245" fill="#1565c0" font-size="10" font-weight="bold">-</text>
</svg>
