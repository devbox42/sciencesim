<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation: I(U)-Kennlinie aufnehmen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --physik: #2c5aa0;
            --bg: #f5f5f5;
            --white: #ffffff;
            --border: #dddddd;
            --text-primary: #222222;
            --text-secondary: #555555;
            --text-muted: #888888;
            --positive: #c62828;
            --negative: #1565c0;
            --success: #2a7a4b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .fullscreen .container {
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--physik);
        }

        h1 {
            font-size: 1.3em;
            font-weight: 600;
            color: var(--physik);
        }

        .fullscreen-btn {
            background: var(--physik);
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 0.85em;
            cursor: pointer;
        }

        .fullscreen-btn:hover {
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
        }

        .fullscreen .main-content {
            flex: 1;
            grid-template-columns: 1fr 320px;
        }

        .circuit-area {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 15px;
        }

        .circuit-svg {
            width: 100%;
            max-width: 500px;
            display: block;
            margin: 0 auto;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 12px;
        }

        .panel h2 {
            font-size: 0.9em;
            font-weight: 600;
            color: var(--physik);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: block;
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--border);
            border-radius: 0;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--physik);
            cursor: pointer;
        }

        .value-display {
            font-family: monospace;
            font-size: 1.1em;
            font-weight: 600;
            min-width: 55px;
            text-align: right;
        }

        .meter {
            background: var(--bg);
            padding: 10px;
            text-align: center;
            margin-top: 8px;
        }

        .meter-label {
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .meter-value {
            font-family: monospace;
            font-size: 1.5em;
            font-weight: 600;
            color: var(--physik);
        }

        .meter-unit {
            font-size: 0.9em;
            color: var(--text-secondary);
        }

        .record-btn {
            width: 100%;
            background: var(--success);
            color: white;
            border: none;
            padding: 10px;
            font-size: 0.9em;
            cursor: pointer;
            margin-top: 10px;
        }

        .record-btn:hover {
            opacity: 0.9;
        }

        .record-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        .data-table th, .data-table td {
            border: 1px solid var(--border);
            padding: 6px 8px;
            text-align: center;
        }

        .data-table th {
            background: var(--bg);
            font-weight: 600;
        }

        .data-table .recorded {
            background: #e8f5e9;
            font-weight: 600;
        }

        .reset-btn {
            background: var(--text-muted);
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 0.8em;
            cursor: pointer;
            margin-top: 8px;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 3px solid var(--physik);
            padding: 10px;
            font-size: 0.85em;
            margin-top: 15px;
        }

        .progress-bar {
            height: 4px;
            background: var(--border);
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            transition: width 0.3s;
        }

        @media (max-width: 700px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>I(U)-Kennlinie aufnehmen</h1>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">Vollbild</button>
        </header>

        <div class="main-content">
            <div class="circuit-area">
                <svg class="circuit-svg" viewBox="0 0 400 280">
                    <!-- Leitungen -->
                    <line x1="50" y1="50" x2="350" y2="50" stroke="#222" stroke-width="2"/>
                    <line x1="350" y1="50" x2="350" y2="230" stroke="#222" stroke-width="2"/>
                    <line x1="350" y1="230" x2="50" y2="230" stroke="#222" stroke-width="2"/>
                    <line x1="50" y1="230" x2="50" y2="50" stroke="#222" stroke-width="2"/>

                    <!-- Spannungsquelle (links) -->
                    <rect x="35" y="110" width="30" height="60" fill="white" stroke="#222" stroke-width="2"/>
                    <!-- + Pol (oben, rot) -->
                    <line x1="40" y1="120" x2="60" y2="120" stroke="#c62828" stroke-width="3"/>
                    <text x="65" y="124" font-size="12" fill="#c62828" font-weight="bold">+</text>
                    <!-- − Pol (unten, blau) -->
                    <line x1="43" y1="160" x2="57" y2="160" stroke="#1565c0" stroke-width="5"/>
                    <text x="65" y="164" font-size="12" fill="#1565c0" font-weight="bold">−</text>
                    <!-- U-Label -->
                    <text x="50" y="200" text-anchor="middle" font-size="14" font-weight="bold">U</text>
                    <text id="voltage-label" x="50" y="215" text-anchor="middle" font-size="12" font-family="monospace">0 V</text>

                    <!-- Widerstand (oben) -->
                    <rect x="160" y="35" width="80" height="30" fill="white" stroke="#222" stroke-width="2"/>
                    <text x="200" y="55" text-anchor="middle" font-size="14" font-weight="bold">R</text>
                    <text x="200" y="25" text-anchor="middle" font-size="11" fill="#555">10 Ω</text>

                    <!-- Amperemeter (rechts) -->
                    <circle cx="350" cy="140" r="25" fill="white" stroke="#222" stroke-width="2"/>
                    <text x="350" y="145" text-anchor="middle" font-size="16" font-weight="bold">A</text>

                    <!-- Stromrichtung (technisch, rot) -->
                    <defs>
                        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                            <polygon points="0 0, 8 3, 0 6" fill="#c62828"/>
                        </marker>
                    </defs>
                    <line x1="280" y1="50" x2="310" y2="50" stroke="#c62828" stroke-width="2" marker-end="url(#arrowhead)"/>
                    <text x="295" y="42" text-anchor="middle" font-size="11" fill="#c62828" font-style="italic">I</text>

                    <!-- Elektronen-Bewegung (optional, blau, entgegengesetzt) -->
                    <g id="electrons" opacity="0.6">
                        <circle class="electron" cx="100" cy="230" r="4" fill="#1565c0"/>
                        <circle class="electron" cx="150" cy="230" r="4" fill="#1565c0"/>
                        <circle class="electron" cx="200" cy="230" r="4" fill="#1565c0"/>
                        <circle class="electron" cx="250" cy="230" r="4" fill="#1565c0"/>
                        <circle class="electron" cx="300" cy="230" r="4" fill="#1565c0"/>
                    </g>
                </svg>

                <div class="info-box">
                    <strong>Aufgabe:</strong> Stelle verschiedene Spannungen ein und notiere die Stromstärke.<br>
                    Übertrage die Werte in dein Arbeitsblatt (Aufgabe 1).
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h2>Steuerung</h2>
                    <div class="control-group">
                        <label>Spannung U einstellen:</label>
                        <div class="slider-container">
                            <input type="range" id="voltage-slider" min="0" max="12" step="2" value="0">
                            <span class="value-display" id="voltage-display">0 V</span>
                        </div>
                    </div>

                    <div class="meter">
                        <div class="meter-label">Amperemeter zeigt:</div>
                        <div class="meter-value" id="current-display">0,00</div>
                        <div class="meter-unit">Ampere (A)</div>
                    </div>

                    <button class="record-btn" id="record-btn" onclick="recordValue()">
                        Messwert eintragen
                    </button>
                </div>

                <div class="panel">
                    <h2>Deine Messwerte</h2>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>U (V)</th>
                                <th>I (A)</th>
                            </tr>
                        </thead>
                        <tbody id="data-body">
                            <tr id="row-2"><td>2</td><td id="val-2">—</td></tr>
                            <tr id="row-4"><td>4</td><td id="val-4">—</td></tr>
                            <tr id="row-6"><td>6</td><td id="val-6">—</td></tr>
                            <tr id="row-8"><td>8</td><td id="val-8">—</td></tr>
                            <tr id="row-10"><td>10</td><td id="val-10">—</td></tr>
                            <tr id="row-12"><td>12</td><td id="val-12">—</td></tr>
                        </tbody>
                    </table>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                    </div>
                    <button class="reset-btn" onclick="resetData()">Zurücksetzen</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Konstanten
        var R = 10; // Ohm
        var recordedVoltages = {};
        var totalMeasurements = 6;

        // DOM-Elemente
        var voltageSlider = document.getElementById('voltage-slider');
        var voltageDisplay = document.getElementById('voltage-display');
        var voltageLabel = document.getElementById('voltage-label');
        var currentDisplay = document.getElementById('current-display');
        var recordBtn = document.getElementById('record-btn');
        var progressFill = document.getElementById('progress-fill');
        var electrons = document.querySelectorAll('.electron');

        // Slider-Event
        voltageSlider.addEventListener('input', function() {
            updateDisplay();
        });

        function updateDisplay() {
            var U = parseInt(voltageSlider.value);
            var I = U / R;

            voltageDisplay.textContent = U + ' V';
            voltageLabel.textContent = U + ' V';
            currentDisplay.textContent = I.toFixed(2).replace('.', ',');

            // Button-Status
            if (U === 0) {
                recordBtn.disabled = true;
                recordBtn.textContent = 'Spannung > 0 wählen';
            } else if (recordedVoltages[U]) {
                recordBtn.disabled = true;
                recordBtn.textContent = 'Bereits gemessen';
            } else {
                recordBtn.disabled = false;
                recordBtn.textContent = 'Messwert eintragen';
            }

            // Elektronen-Animation (Geschwindigkeit proportional zu I)
            animateElectrons(I);
        }

        function recordValue() {
            var U = parseInt(voltageSlider.value);
            if (U === 0 || recordedVoltages[U]) return;

            var I = U / R;
            recordedVoltages[U] = I;

            // Tabelle aktualisieren
            var cell = document.getElementById('val-' + U);
            if (cell) {
                cell.textContent = I.toFixed(2).replace('.', ',');
                cell.parentElement.classList.add('recorded');
            }

            // Fortschritt aktualisieren
            var count = Object.keys(recordedVoltages).length;
            progressFill.style.width = (count / totalMeasurements * 100) + '%';

            updateDisplay();

            // Alle gemessen?
            if (count === totalMeasurements) {
                setTimeout(function() {
                    alert('Alle Messwerte aufgenommen!\n\nÜbertrage sie jetzt in dein Arbeitsblatt (Aufgabe 1) und zeichne die Kennlinie (Aufgabe 2).');
                }, 300);
            }
        }

        function resetData() {
            if (!confirm('Alle Messwerte löschen?')) return;

            recordedVoltages = {};
            var cells = document.querySelectorAll('[id^="val-"]');
            for (var i = 0; i < cells.length; i++) {
                cells[i].textContent = '—';
                cells[i].parentElement.classList.remove('recorded');
            }
            progressFill.style.width = '0%';
            updateDisplay();
        }

        // Elektronen-Animation
        var electronPositions = [100, 150, 200, 250, 300];
        var animationId = null;

        function animateElectrons(I) {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            if (I === 0) {
                // Elektronen zurücksetzen
                for (var i = 0; i < electrons.length; i++) {
                    electronPositions[i] = 100 + i * 50;
                    electrons[i].setAttribute('cx', electronPositions[i]);
                }
                return;
            }

            var speed = I * 0.5; // Geschwindigkeit proportional zum Strom

            function step() {
                for (var i = 0; i < electrons.length; i++) {
                    electronPositions[i] -= speed; // Elektronen bewegen sich entgegen der techn. Stromrichtung
                    if (electronPositions[i] < 50) {
                        electronPositions[i] = 350;
                    }
                    electrons[i].setAttribute('cx', electronPositions[i]);
                }
                animationId = requestAnimationFrame(step);
            }
            step();
        }

        // Vollbild
        function toggleFullscreen() {
            document.body.classList.toggle('fullscreen');
            var btn = document.querySelector('.fullscreen-btn');
            btn.textContent = document.body.classList.contains('fullscreen') ? 'Beenden' : 'Vollbild';
        }

        // Initialisierung
        updateDisplay();
    </script>
</body>
</html>
