<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbos en Presente — ¿Cuánto sabes? | Spanisch Klasse 8</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --white: #ffffff;
            --border: #dddddd;
            --text-primary: #222222;
            --text-secondary: #555555;
            --text-muted: #888888;
            --spanisch: #c41e3a;
            --spanisch-light: #f8e8eb;
            --success: #2a7a4b;
            --success-light: #e8f5e9;
            --warning: #b35c00;
            --warning-light: #fff3e0;
            --error: #c62828;
            --error-light: #ffebee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: rgba(196,30,58,0.2); }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--bg);
        }

        .container { max-width: 700px; margin: 0 auto; padding: 20px; }

        header {
            background: var(--spanisch);
            color: white;
            padding: 15px 20px;
        }
        header h1 { font-size: 1.4em; font-weight: 600; margin: 0; }
        header .meta { font-size: 0.85em; opacity: 0.9; margin-top: 4px; }

        /* === SCREENS === */
        .screen { display: none; }
        .screen.active { display: block; }

        /* === START === */
        .start-card {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 40px 20px;
            text-align: center;
        }
        .start-card h2 { font-size: 1.6em; font-weight: 700; margin-bottom: 8px; }
        .start-card h2 span { color: var(--spanisch); }
        .start-card p { color: var(--text-muted); margin-bottom: 24px; }

        .btn {
            font-family: inherit;
            font-size: 1.1em;
            font-weight: 600;
            padding: 14px 40px;
            border: none;
            cursor: pointer;
            min-height: 48px;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn:active { opacity: 0.85; }
        .btn-primary { background: var(--spanisch); color: white; }

        /* === GAME === */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .q-counter { font-weight: 600; color: var(--text-muted); }

        .progress-bar {
            height: 8px;
            background: var(--border);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .progress-fill {
            height: 100%;
            background: var(--spanisch);
            transition: width 0.4s ease;
            width: 0%;
        }

        .question-card {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 24px 20px;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .q-type {
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--spanisch);
        }
        .q-prompt {
            font-size: 1.4em;
            font-weight: 600;
            line-height: 1.4;
        }
        .q-prompt .blank {
            display: inline-block;
            min-width: 100px;
            border-bottom: 3px dashed var(--spanisch);
            color: var(--spanisch);
            text-align: center;
        }
        .q-context {
            font-size: 0.9em;
            color: var(--text-muted);
            font-style: italic;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: auto;
        }
        .option-btn {
            font-family: inherit;
            font-size: 1.05em;
            font-weight: 500;
            padding: 14px 10px;
            border: 2px solid var(--border);
            background: var(--white);
            cursor: pointer;
            text-align: center;
            min-height: 48px;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .option-btn:active { border-color: var(--spanisch); }
        .option-btn.correct { border-color: var(--success); background: var(--success-light); color: var(--success); font-weight: 600; }
        .option-btn.wrong { border-color: var(--error); background: var(--error-light); color: var(--error); opacity: 0.7; }
        .option-btn.disabled { pointer-events: none; }

        .feedback-bar {
            text-align: center;
            font-weight: 600;
            font-size: 1.1em;
            padding: 12px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .feedback-bar.show { opacity: 1; }
        .feedback-bar.fb-correct { background: var(--success-light); color: var(--success); }
        .feedback-bar.fb-wrong { background: var(--error-light); color: var(--error); }

        /* === RESULTS === */
        .results-card {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 30px 20px;
            text-align: center;
        }
        .results-emoji { font-size: 3.5em; margin-bottom: 12px; }
        .results-card h2 { font-size: 1.5em; font-weight: 700; margin-bottom: 8px; }
        .results-summary {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--spanisch);
            margin-bottom: 20px;
        }

        .results-breakdown {
            text-align: left;
            max-width: 500px;
            margin: 0 auto 20px;
        }
        .results-breakdown h3 {
            font-size: 0.95em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .category-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9em;
        }
        .cat-bar {
            width: 70px;
            height: 6px;
            background: var(--border);
            overflow: hidden;
        }
        .cat-fill { height: 100%; }

        /* === WRONG ANSWERS REVIEW === */
        .review-section {
            text-align: left;
            max-width: 500px;
            margin: 0 auto 20px;
        }
        .review-section h3 {
            font-size: 0.95em;
            color: var(--error);
            margin-bottom: 10px;
        }
        .review-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: var(--error-light);
            border-left: 3px solid var(--error);
            font-size: 0.9em;
        }
        .review-item .review-q { font-weight: 600; margin-bottom: 4px; }
        .review-item .review-given { color: var(--error); }
        .review-item .review-correct { color: var(--success); font-weight: 600; }


        @media (max-width: 500px) {
            .options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Verbos en Presente — ¿Cuánto sabes?</h1>
    <div class="meta">Spanisch Klasse 8 · Qué pasa 1, Unidades 1–6 · Verbkonjugation Presente</div>
</header>

<div class="container">

<!-- START -->
<div id="startScreen" class="screen active">
    <div class="start-card">
        <h2>Verbos en <span>Presente</span></h2>
        <p>Teste dein Wissen über spanische Verben im Präsens.<br>20 Fragen — wie viele schaffst du?</p>
        <button class="btn btn-primary" id="startBtn">¡Vamos!</button>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
    <div class="game-header">
        <span class="q-counter" id="qCounter"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="question-card">
        <span class="q-type" id="qType"></span>
        <div class="q-prompt" id="qPrompt"></div>
        <div class="q-context" id="qContext"></div>
        <div class="options" id="optionsContainer"></div>
    </div>
    <div class="feedback-bar" id="feedbackBar"></div>
</div>

<!-- RESULTS -->
<div id="resultsScreen" class="screen">
    <div class="results-card">
        <div class="results-emoji" id="resultsEmoji"></div>
        <h2 id="resultsTitle"></h2>
        <div class="results-summary" id="resultsSummary"></div>
        <div class="results-breakdown" id="resultsBreakdown"></div>
        <div class="review-section" id="reviewSection"></div>
        <button class="btn btn-primary" id="retryBtn">Nochmal spielen</button>
    </div>
</div>

</div>

<script>
/* === QUESTION BANK ===
   Qué pasa 1, Unidades 1–6 — nur bekannte Verben & Formen.
   Alle Distraktoren sind existierende span. Formen (keine Phantasie-Wörter). */
var questionBank = [
    // -ar regulär
    { cat: "Regelmäßige Verben (-ar)", type: "Konjugiere", prompt: "hablar (yo)", answer: "hablo", options: ["hablo", "habla", "hablas", "hablamos"] },
    { cat: "Regelmäßige Verben (-ar)", type: "Konjugiere", prompt: "estudiar (nosotros)", answer: "estudiamos", options: ["estudiamos", "estudian", "estudiáis", "estudias"] },
    { cat: "Regelmäßige Verben (-ar)", type: "Konjugiere", prompt: "trabajar (ella)", answer: "trabaja", options: ["trabaja", "trabajo", "trabajas", "trabajan"] },
    { cat: "Regelmäßige Verben (-ar)", type: "Ergänze den Satz", prompt: "María ___ español y alemán.", answer: "habla", options: ["habla", "hablas", "hablo", "hablan"], context: "(hablar — María = ella)" },
    { cat: "Regelmäßige Verben (-ar)", type: "Konjugiere", prompt: "comprar (vosotros)", answer: "compráis", options: ["compráis", "compramos", "compran", "compras"] },
    { cat: "Regelmäßige Verben (-ar)", type: "Ergänze den Satz", prompt: "Mis amigos ___ mucho.", answer: "viajan", options: ["viajan", "viaja", "viajamos", "viajas"], context: "(viajar — mis amigos = ellos)" },

    // -er regulär
    { cat: "Regelmäßige Verben (-er)", type: "Konjugiere", prompt: "comer (tú)", answer: "comes", options: ["comes", "come", "comemos", "coméis"] },
    { cat: "Regelmäßige Verben (-er)", type: "Konjugiere", prompt: "beber (yo)", answer: "bebo", options: ["bebo", "bebe", "bebemos", "bebes"] },
    { cat: "Regelmäßige Verben (-er)", type: "Ergänze den Satz", prompt: "Nosotros ___ en la cafetería.", answer: "comemos", options: ["comemos", "comen", "come", "coméis"], context: "(comer)" },
    { cat: "Regelmäßige Verben (-er)", type: "Konjugiere", prompt: "leer (ellos)", answer: "leen", options: ["leen", "lee", "leemos", "leéis"] },

    // -ir regulär
    { cat: "Regelmäßige Verben (-ir)", type: "Konjugiere", prompt: "vivir (yo)", answer: "vivo", options: ["vivo", "vive", "vives", "vivimos"] },
    { cat: "Regelmäßige Verben (-ir)", type: "Konjugiere", prompt: "escribir (nosotros)", answer: "escribimos", options: ["escribimos", "escriben", "escribe", "escribís"] },
    { cat: "Regelmäßige Verben (-ir)", type: "Ergänze den Satz", prompt: "¿Dónde ___ tus padres?", answer: "viven", options: ["viven", "vive", "vivimos", "vives"], context: "(vivir — tus padres = ellos)" },
    { cat: "Regelmäßige Verben (-ir)", type: "Konjugiere", prompt: "escribir (tú)", answer: "escribes", options: ["escribes", "escribe", "escribo", "escribimos"] },

    // ser / estar
    { cat: "ser / estar", type: "ser oder estar?", prompt: "Yo ___ de Alemania.", answer: "soy", options: ["soy", "estoy", "es", "está"], context: "(Herkunft → ¿ser o estar?)" },
    { cat: "ser / estar", type: "ser oder estar?", prompt: "¿Cómo ___ tú? — Bien, gracias.", answer: "estás", options: ["estás", "eres", "está", "es"], context: "(Befinden → ¿ser o estar?)" },
    { cat: "ser / estar", type: "ser oder estar?", prompt: "Madrid ___ en España.", answer: "está", options: ["está", "es", "están", "son"], context: "(Ort → ¿ser o estar?)" },
    { cat: "ser / estar", type: "ser oder estar?", prompt: "Nosotros ___ estudiantes.", answer: "somos", options: ["somos", "estamos", "son", "están"], context: "(Beruf/Eigenschaft → ¿ser o estar?)" },
    { cat: "ser / estar", type: "Konjugiere", prompt: "ser (vosotros)", answer: "sois", options: ["sois", "somos", "son", "estáis"], context: "" },

    // tener / ir / hacer
    { cat: "tener / ir / hacer", type: "Konjugiere", prompt: "tener (yo)", answer: "tengo", options: ["tengo", "tiene", "tienes", "tienen"] },
    { cat: "tener / ir / hacer", type: "Konjugiere", prompt: "ir (nosotros)", answer: "vamos", options: ["vamos", "van", "vais", "va"] },
    { cat: "tener / ir / hacer", type: "Ergänze den Satz", prompt: "¿Qué ___ tú esta tarde?", answer: "haces", options: ["haces", "hago", "hace", "hacemos"], context: "(hacer)" },
    { cat: "tener / ir / hacer", type: "Konjugiere", prompt: "ir (ellos)", answer: "van", options: ["van", "va", "vais", "vamos"] },
    { cat: "tener / ir / hacer", type: "Ergänze den Satz", prompt: "Mi hermana ___ 15 años.", answer: "tiene", options: ["tiene", "tengo", "es", "está"], context: "(tener — Alter!)" },

    // querer / poder
    { cat: "querer / poder", type: "Konjugiere", prompt: "querer (yo)", answer: "quiero", options: ["quiero", "quiere", "quieres", "queremos"] },
    { cat: "querer / poder", type: "Konjugiere", prompt: "poder (tú)", answer: "puedes", options: ["puedes", "podéis", "puede", "podemos"] },
    { cat: "querer / poder", type: "Ergänze den Satz", prompt: "No ___ ir al cine, tengo que estudiar.", answer: "puedo", options: ["puedo", "puedes", "puede", "pueden"], context: "(poder, yo)" },
    { cat: "querer / poder", type: "Ergänze den Satz", prompt: "¿___ venir a mi fiesta?", answer: "Quieres", options: ["Quieres", "Quiere", "Quiero", "Queremos"], context: "(querer, tú)" }
];

/* === GAME STATE === */
var state = {
    questions: [],
    current: 0,
    correctCount: 0,
    categoryScores: {},
    wrongAnswers: [],
    totalQuestions: 20
};

/* === UTILITY === */
function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
}

function showScreen(id) {
    var screens = document.querySelectorAll('.screen');
    for (var k = 0; k < screens.length; k++) screens[k].classList.remove('active');
    document.getElementById(id).classList.add('active');
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

/* === INIT === */
function initGame() {
    state.questions = shuffle(questionBank).slice(0, state.totalQuestions);
    state.current = 0;
    state.correctCount = 0;
    state.categoryScores = {};
    state.wrongAnswers = [];

    for (var i = 0; i < state.questions.length; i++) {
        var cat = state.questions[i].cat;
        if (!state.categoryScores[cat]) state.categoryScores[cat] = { correct: 0, total: 0 };
        state.categoryScores[cat].total++;
    }

    showScreen('gameScreen');
    renderQuestion();
}

function renderQuestion() {
    var q = state.questions[state.current];
    var pct = (state.current / state.totalQuestions) * 100;
    document.getElementById('progressFill').style.width = pct + '%';

    document.getElementById('qCounter').textContent = 'Frage ' + (state.current + 1) + ' / ' + state.totalQuestions;
    document.getElementById('qType').textContent = q.type;

    if (q.type === 'Ergänze den Satz' || q.type === 'ser oder estar?') {
        var parts = q.prompt.split('___');
        document.getElementById('qPrompt').innerHTML =
            escapeHtml(parts[0]) + '<span class="blank">???</span>' + escapeHtml(parts[1] || '');
    } else {
        document.getElementById('qPrompt').textContent = q.prompt;
    }

    document.getElementById('qContext').textContent = q.context || '';

    var opts = shuffle(q.options);
    var container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    for (var i = 0; i < opts.length; i++) {
        (function(opt) {
            var btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.addEventListener('click', function() { handleAnswer(btn, opt, q.answer); });
            container.appendChild(btn);
        })(opts[i]);
    }

    document.getElementById('feedbackBar').className = 'feedback-bar';
    document.getElementById('feedbackBar').textContent = '';
}

function handleAnswer(btn, selected, correct) {
    var allBtns = document.querySelectorAll('.option-btn');
    for (var i = 0; i < allBtns.length; i++) allBtns[i].classList.add('disabled');

    var fb = document.getElementById('feedbackBar');
    var q = state.questions[state.current];

    if (selected === correct) {
        btn.classList.add('correct');
        state.correctCount++;
        state.categoryScores[q.cat].correct++;

        var msgs = ['¡Correcto!', '¡Muy bien!', '¡Genial!', '¡Perfecto!', '¡Exacto!'];
        fb.textContent = msgs[Math.floor(Math.random() * msgs.length)];
        fb.className = 'feedback-bar fb-correct show';
    } else {
        btn.classList.add('wrong');
        for (var j = 0; j < allBtns.length; j++) {
            if (allBtns[j].textContent === correct) allBtns[j].classList.add('correct');
        }
        state.wrongAnswers.push({ prompt: q.prompt, context: q.context || '', given: selected, correct: correct });

        fb.textContent = 'Richtige Antwort: ' + correct;
        fb.className = 'feedback-bar fb-wrong show';
    }

    setTimeout(function() {
        state.current++;
        if (state.current >= state.totalQuestions) {
            showResults();
        } else {
            renderQuestion();
        }
    }, 1500);
}

function showResults() {
    var pct = Math.round((state.correctCount / state.totalQuestions) * 100);

    var emoji, title;
    if (pct >= 90) { emoji = '🏆'; title = '¡Increíble!'; }
    else if (pct >= 70) { emoji = '⭐'; title = '¡Muy bien!'; }
    else if (pct >= 50) { emoji = '💪'; title = 'Nicht schlecht!'; }
    else { emoji = '📚'; title = 'Weiter üben!'; }

    document.getElementById('resultsEmoji').textContent = emoji;
    document.getElementById('resultsTitle').textContent = title;
    document.getElementById('resultsSummary').textContent = state.correctCount + ' / ' + state.totalQuestions + ' richtig (' + pct + '%)';

    /* Category breakdown */
    var bd = document.getElementById('resultsBreakdown');
    bd.innerHTML = '';
    var heading = document.createElement('h3');
    heading.textContent = 'Ergebnisse nach Kategorie:';
    bd.appendChild(heading);

    var cats = Object.keys(state.categoryScores);
    for (var i = 0; i < cats.length; i++) {
        var cat = cats[i];
        var data = state.categoryScores[cat];
        var catPct = data.total > 0 ? Math.round((data.correct / data.total) * 100) : 0;
        var color = catPct >= 70 ? 'var(--success)' : catPct >= 40 ? 'var(--warning)' : 'var(--error)';

        var row = document.createElement('div');
        row.className = 'category-result';

        var label = document.createElement('span');
        label.textContent = cat;

        var count = document.createElement('span');
        count.textContent = data.correct + '/' + data.total;

        var barWrap = document.createElement('div');
        barWrap.className = 'cat-bar';
        var barFill = document.createElement('div');
        barFill.className = 'cat-fill';
        barFill.style.width = catPct + '%';
        barFill.style.background = color;
        barWrap.appendChild(barFill);

        row.appendChild(label);
        row.appendChild(count);
        row.appendChild(barWrap);
        bd.appendChild(row);
    }

    /* Wrong-answer review */
    var rs = document.getElementById('reviewSection');
    rs.innerHTML = '';
    if (state.wrongAnswers.length > 0) {
        var rh = document.createElement('h3');
        rh.textContent = 'Fehler zum Nachlernen (' + state.wrongAnswers.length + '):';
        rs.appendChild(rh);

        for (var w = 0; w < state.wrongAnswers.length; w++) {
            var wa = state.wrongAnswers[w];
            var item = document.createElement('div');
            item.className = 'review-item';

            var qLine = document.createElement('div');
            qLine.className = 'review-q';
            qLine.textContent = wa.prompt + (wa.context ? ' ' + wa.context : '');
            item.appendChild(qLine);

            var givenLine = document.createElement('div');
            givenLine.className = 'review-given';
            givenLine.textContent = 'Deine Antwort: ' + wa.given;
            item.appendChild(givenLine);

            var correctLine = document.createElement('div');
            correctLine.className = 'review-correct';
            correctLine.textContent = 'Richtig: ' + wa.correct;
            item.appendChild(correctLine);

            rs.appendChild(item);
        }
    }

    document.getElementById('progressFill').style.width = '100%';
    showScreen('resultsScreen');
}

/* === EVENT LISTENERS === */
document.getElementById('startBtn').addEventListener('click', function() {
    initGame();
});

document.getElementById('retryBtn').addEventListener('click', function() {
    initGame();
});
</script>
</body>
</html>
