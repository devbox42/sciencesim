<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platzkarten P1-P30</title>
    <style>
        /* ═══════════════════════════════════════════════════════════════
           PLATZKARTEN für Spanisch-Test
           Fachfarbe: #c41e3a (Karminrot)
        ═══════════════════════════════════════════════════════════════ */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.4;
            background: #f5f5f5;
            padding: 20px;
        }

        .header {
            max-width: 1000px;
            margin: 0 auto 20px;
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
        }

        .header h1 {
            color: #c41e3a;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #555;
            margin-bottom: 10px;
        }

        .header .hint {
            background: #fff3e0;
            border: 1px solid #b35c00;
            padding: 10px;
            font-size: 0.9em;
            color: #b35c00;
        }

        .controls {
            max-width: 1000px;
            margin: 0 auto 20px;
            background: #fff;
            padding: 15px 20px;
            border: 1px solid #ddd;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls label {
            font-weight: 600;
        }

        .controls select, .controls input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            font-size: 1em;
        }

        .btn {
            padding: 10px 20px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-print {
            background: #c41e3a;
            color: #fff;
        }

        .btn-print:hover {
            background: #a01830;
        }

        /* Karten-Grid */
        .cards-grid {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: #fff;
            border: 3px solid #c41e3a;
            padding: 20px;
            text-align: center;
            aspect-ratio: 1.5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-number {
            font-size: 3em;
            font-weight: 700;
            color: #c41e3a;
            margin-bottom: 10px;
        }

        .card-name {
            border-bottom: 2px solid #c41e3a;
            width: 90%;
            min-height: 30px;
            margin-bottom: 10px;
        }

        .card-info {
            font-size: 0.8em;
            color: #888;
        }

        .card-qr {
            margin-top: 10px;
            width: 80px;
            height: 80px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            color: #888;
        }

        /* Print Styles */
        @media print {
            body {
                background: #fff;
                padding: 0;
            }

            .header, .controls {
                display: none !important;
            }

            .cards-grid {
                max-width: 100%;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10mm;
                page-break-inside: auto;
            }

            .card {
                border: 2px solid #000;
                page-break-inside: avoid;
                height: 60mm;
            }

            .card-number {
                color: #000;
            }

            .card-name {
                border-bottom: 1px solid #000;
            }

            .card-qr {
                display: none;
            }
        }

        @media print and (orientation: landscape) {
            .cards-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Platzkarten fuer Spanisch-Test</h1>
    <p>Diese Karten werden auf die Tische gelegt. Jeder Schueler merkt sich seine Platznummer und traegt sie im Test ein.</p>
    <div class="hint">
        <strong>Tipp:</strong> Drucke diese Seite im Querformat (Landscape) aus und schneide die Karten aus. Die Schueler schreiben ihren Namen auf die Linie.
    </div>
</div>

<div class="controls">
    <label>Anzahl Karten:</label>
    <select id="cardCount" onchange="generateCards()">
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="20">20</option>
        <option value="25">25</option>
        <option value="30" selected>30</option>
    </select>

    <label style="margin-left:20px;">Mit QR-Platzhalter:</label>
    <input type="checkbox" id="showQR" onchange="generateCards()">

    <button class="btn btn-print" onclick="window.print()" style="margin-left:auto;">Drucken</button>
</div>

<div class="cards-grid" id="cardsGrid">
    <!-- Cards werden per JavaScript generiert -->
</div>

<script>
function generateCards() {
    var count = parseInt(document.getElementById('cardCount').value);
    var showQR = document.getElementById('showQR').checked;
    var grid = document.getElementById('cardsGrid');

    grid.innerHTML = '';

    for (var i = 1; i <= count; i++) {
        var card = document.createElement('div');
        card.className = 'card';

        var numberDiv = document.createElement('div');
        numberDiv.className = 'card-number';
        numberDiv.textContent = 'P' + i;
        card.appendChild(numberDiv);

        var nameDiv = document.createElement('div');
        nameDiv.className = 'card-name';
        card.appendChild(nameDiv);

        var infoDiv = document.createElement('div');
        infoDiv.className = 'card-info';
        infoDiv.textContent = 'Name hier eintragen';
        card.appendChild(infoDiv);

        if (showQR) {
            var qrDiv = document.createElement('div');
            qrDiv.className = 'card-qr';
            qrDiv.textContent = '[QR]';
            card.appendChild(qrDiv);
        }

        grid.appendChild(card);
    }
}

// Initial generation
generateCards();
</script>

</body>
</html>
